<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер с БД</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #17212b;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #2c3a47;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open { transform: translateX(0); }
        }
        
        .header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c3a47;
        }
        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        .user-name { color: white; font-size: 18px; font-weight: 600; flex: 1; }
        .icon-btn {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }
        .search {
            width: 100%;
            padding: 10px 16px;
            background: #1f2a36;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1f2a36;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .user-item:active { background: #2b3a4a; }
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 12px;
            position: relative;
        }
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4cd137;
            border-radius: 50%;
            border: 2px solid #1f2a36;
        }
        .user-info { flex: 1; }
        .user-name-text { color: white; font-weight: 500; }
        .user-preview { font-size: 11px; color: #8e9eae; margin-top: 2px; }
        
        /* Chat panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #17212b;
        }
        .chat-header {
            padding: 16px 20px;
            background: #1f2a36;
            border-bottom: 1px solid #2c3a47;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 24px;
            cursor: pointer;
            display: none;
        }
        @media (max-width: 768px) { .back-btn { display: block; } }
        .chat-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .chat-info { flex: 1; }
        .chat-name { color: white; font-weight: 600; }
        .chat-status { font-size: 12px; color: #8e9eae; }
        .typing-status { font-size: 11px; color: #50a6e5; margin-top: 2px; }
        
        /* Messages */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            display: flex;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
        }
        .message.sent .message-bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received .message-bubble {
            background: #1f2a36;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .message-text { font-size: 15px; word-wrap: break-word; }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right; }
        
        /* Input */
        .input-panel {
            padding: 12px 16px;
            background: #1f2a36;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: #17212b;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        .send-btn {
            width: 44px;
            height: 44px;
            background: #50a6e5;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .empty-state { text-align: center; color: #8e9eae; margin-top: 50px; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1f2a36;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 340px;
        }
        .modal-content h3 { color: white; margin-bottom: 16px; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #17212b;
            border: none;
            border-radius: 12px;
            color: white;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary { background: #50a6e5; color: white; }
        .btn-danger { background: #e53935; color: white; }
        .btn-secondary { background: #2b3a4a; color: #8e9eae; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a36;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            animation: fadeIn 0.3s;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="header">
            <div class="user-row">
                <div class="avatar" id="myAvatar" onclick="openProfileModal()">👤</div>
                <div class="user-name" id="myName">Загрузка...</div>
                <button class="icon-btn" onclick="openProfileModal()">⚙️</button>
            </div>
            <input type="text" class="search" id="searchInput" placeholder="Поиск" onkeyup="filterUsers()">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
    
    <div class="chat-panel">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">💬</div>
            <div class="chat-info">
                <div class="chat-name" id="chatName">Мессенджер</div>
                <div class="chat-status" id="chatStatus">Выберите чат</div>
                <div class="typing-status" id="typingStatus"></div>
            </div>
            <button class="icon-btn" onclick="clearChatHistory()" id="clearBtn" style="display: none;">🗑️</button>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="empty-state">✨ Нажмите на пользователя</div>
        </div>
        <div class="input-panel">
            <textarea class="input-field" id="messageInput" placeholder="Сообщение" rows="1" onkeypress="handleEnter(event)" onkeyup="onTyping()"></textarea>
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>📝 Профиль</h3>
        <input type="text" id="editName" placeholder="Имя">
        <input type="text" id="editAvatar" placeholder="Аватар" maxlength="2">
        <textarea id="editBio" placeholder="О себе" rows="2"></textarea>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-danger" onclick="deleteAccount()">Удалить аккаунт</button>
            <button class="btn-secondary" onclick="closeModal('profileModal')">Отмена</button>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let currentUser = { id: '', name: '', avatar: '😊', bio: '' };
    let users = new Map();
    let messages = new Map();
    let currentChatId = null;
    let typingTimeout = null;
    
    function init() {
        let savedId = localStorage.getItem('userId');
        if (!savedId) {
            savedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', savedId);
        }
        currentUser.id = savedId;
        
        let savedData = localStorage.getItem('userData');
        if (savedData) {
            const data = JSON.parse(savedData);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
            currentUser.bio = data.bio || '';
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            currentUser.avatar = ['😊','😎','🤓','🥳'][Math.floor(Math.random()*4)];
            localStorage.setItem('userData', JSON.stringify({ name: currentUser.name, avatar: currentUser.avatar, bio: '' }));
        }
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        connect();
    }
    
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar,
                bio: currentUser.bio
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'users') {
                users.clear();
                data.users.forEach(user => {
                    if (user.id !== currentUser.id) {
                        users.set(user.id, {
                            name: user.name,
                            avatar: user.avatar,
                            online: user.online,
                            isAdmin: user.is_admin
                        });
                    }
                });
                renderUsers();
            }
            
            if (data.type === 'all_history') {
                data.chats.forEach(chat => {
                    if (chat.withUser && chat.messages) {
                        messages.set(chat.withUser, chat.messages);
                    }
                });
                if (currentChatId) renderMessages();
                renderUsers();
            }
            
            if (data.type === 'new_message') {
                const fromId = data.message.from;
                if (!messages.has(fromId)) messages.set(fromId, []);
                messages.get(fromId).push({
                    id: data.message.id,
                    text: data.message.text,
                    time: data.message.time,
                    isMine: false
                });
                if (currentChatId === fromId) {
                    renderMessages();
                    markAsRead(fromId);
                } else {
                    const user = users.get(fromId);
                    if (user) {
                        user.unread = (user.unread || 0) + 1;
                        renderUsers();
                        showToast(`📩 ${data.fromName}: ${data.message.text.substring(0, 30)}`);
                    }
                }
            }
            
            if (data.type === 'message_sent') {
                if (currentChatId) {
                    const msgs = messages.get(currentChatId);
                    if (msgs && msgs.length > 0) {
                        const last = msgs[msgs.length - 1];
                        if (last.text === data.message.text) {
                            last.id = data.messageId;
                            renderMessages();
                        }
                    }
                }
            }
            
            if (data.type === 'message_deleted') {
                if (currentChatId) {
                    const msgs = messages.get(currentChatId);
                    const idx = msgs.findIndex(m => m.id === data.messageId);
                    if (idx !== -1) {
                        msgs[idx].text = '🗑️ Сообщение удалено';
                        msgs[idx].deleted = true;
                        renderMessages();
                    }
                }
            }
            
            if (data.type === 'history_cleared') {
                if (currentChatId) {
                    messages.set(currentChatId, []);
                    renderMessages();
                    showToast('🗑️ История очищена');
                }
            }
            
            if (data.type === 'account_deleted') {
                showToast('Аккаунт удалён');
                localStorage.clear();
                setTimeout(() => location.reload(), 2000);
            }
            
            if (data.type === 'typing') {
                if (currentChatId === data.from) {
                    const typingDiv = document.getElementById('typingStatus');
                    if (data.isTyping) {
                        typingDiv.textContent = '✍️ печатает...';
                    } else {
                        typingDiv.textContent = '';
                    }
                }
            }
        };
        
        ws.onclose = () => setTimeout(connect, 3000);
    }
    
    function renderUsers() {
        const container = document.getElementById('usersList');
        const filtered = Array.from(users.entries());
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#8e9eae;padding:40px;">👥 Нет пользователей</div>';
            return;
        }
        
        container.innerHTML = filtered.map(([id, user]) => {
            const msgs = messages.get(id) || [];
            const lastMsg = msgs[msgs.length - 1];
            const unread = user.unread || 0;
            return `
                <div class="user-item" onclick="openChat('${id}')">
                    <div class="user-avatar">
                        ${user.avatar}
                        ${user.online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="user-info">
                        <div class="user-name-text">${escapeHtml(user.name)}</div>
                        <div class="user-preview">${user.online ? '🟢 онлайн' : '⚫ не в сети'}</div>
                        ${lastMsg ? `<div class="user-preview">📝 ${escapeHtml(lastMsg.text.substring(0, 25))}</div>` : ''}
                    </div>
                    ${unread > 0 ? `<div style="background:#50a6e5; color:white; border-radius:20px; padding:2px 8px; font-size:12px;">${unread}</div>` : ''}
                </div>
            `;
        }).join('');
    }
    
    function openChat(userId) {
        currentChatId = userId;
        const user = users.get(userId);
        document.getElementById('chatName').textContent = user.name;
        document.getElementById('chatAvatar').textContent = user.avatar;
        document.getElementById('chatStatus').innerHTML = user.online ? '🟢 онлайн' : '⚫ не в сети';
        document.getElementById('clearBtn').style.display = 'flex';
        
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        if (user.unread) {
            user.unread = 0;
            renderUsers();
            markAsRead(userId);
        }
        
        renderMessages();
        setTimeout(() => document.getElementById('messageInput').focus(), 100);
    }
    
    function closeChat() {
        currentChatId = null;
        document.getElementById('chatName').textContent = 'Мессенджер';
        document.getElementById('chatAvatar').textContent = '💬';
        document.getElementById('chatStatus').innerHTML = 'Выберите чат';
        document.getElementById('clearBtn').style.display = 'none';
        document.getElementById('messagesArea').innerHTML = '<div class="empty-state">✨ Нажмите на пользователя</div>';
    }
    
    function renderMessages() {
        if (!currentChatId) return;
        const msgs = messages.get(currentChatId) || [];
        const container = document.getElementById('messagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.from === currentUser.id ? 'sent' : 'received'}">
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time || 'только что'}</div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        
        if (!messages.has(currentChatId)) messages.set(currentChatId, []);
        messages.get(currentChatId).push({
            text: text,
            time: time,
            from: currentUser.id,
            isMine: true
        });
        
        ws.send(JSON.stringify({
            type: 'message',
            from: currentUser.id,
            to: currentChatId,
            text: text,
            time: time,
            fromName: currentUser.name
        }));
        
        renderMessages();
        renderUsers();
        input.value = '';
        
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChatId,
            from: currentUser.id,
            isTyping: false
        }));
    }
    
    function markAsRead(userId) {
        ws.send(JSON.stringify({
            type: 'mark_read',
            userId: currentUser.id,
            otherId: userId
        }));
    }
    
    function clearChatHistory() {
        if (!currentChatId || !confirm('Очистить всю историю переписки?')) return;
        ws.send(JSON.stringify({
            type: 'clear_history',
            userId: currentUser.id,
            withUserId: currentChatId
        }));
        messages.set(currentChatId, []);
        renderMessages();
    }
    
    function onTyping() {
        if (!currentChatId || !ws) return;
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChatId,
            from: currentUser.id,
            fromName: currentUser.name,
            isTyping: true
        }));
        typingTimeout = setTimeout(() => {
            ws.send(JSON.stringify({
                type: 'typing',
                to: currentChatId,
                from: currentUser.id,
                isTyping: false
            }));
        }, 1000);
    }
    
    function saveProfile() {
        const name = document.getElementById('editName').value.trim();
        const avatar = document.getElementById('editAvatar').value.trim();
        const bio = document.getElementById('editBio').value.trim();
        
        if (name) currentUser.name = name;
        if (avatar) currentUser.avatar = avatar;
        if (bio) currentUser.bio = bio;
        
        localStorage.setItem('userData', JSON.stringify({
            name: currentUser.name,
            avatar: currentUser.avatar,
            bio: currentUser.bio
        }));
        
        ws.send(JSON.stringify({
            type: 'update_profile',
            userId: currentUser.id,
            name: currentUser.name,
            avatar: currentUser.avatar,
            bio: currentUser.bio
        }));
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        closeModal('profileModal');
        showToast('✅ Профиль обновлён');
    }
    
    function deleteAccount() {
        if (!confirm('❗ ВЫ УВЕРЕНЫ? Аккаунт будет удалён навсегда!')) return;
        ws.send(JSON.stringify({ type: 'delete_account', userId: currentUser.id }));
    }
    
    function handleEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function filterUsers() { renderUsers(); }
    function openProfileModal() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editAvatar').value = currentUser.avatar;
        document.getElementById('editBio').value = currentUser.bio || '';
        document.getElementById('profileModal').style.display = 'flex';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    init();
</script>
</body>
</html>
