<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CloudChat - Общайся с друзьями</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .app {
            width: 1300px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        /* Боковая панель */
        .sidebar {
            width: 350px;
            background: #f0f2f5;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            background: #0088cc;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .settings-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
        }
        
        .search-box {
            padding: 15px;
            background: white;
        }
        
        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.3s;
            position: relative;
        }
        
        .user-item:hover {
            background: #e9ecef;
        }
        
        .user-item.active {
            background: #e9ecef;
            border-left: 3px solid #0088cc;
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;
            position: relative;
        }
        
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4cd137;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .user-info-text {
            flex: 1;
        }
        
        .user-name-text {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .user-status {
            font-size: 12px;
            color: #666;
        }
        
        /* Основная область */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }
        
        .chat-header {
            background: white;
            padding: 20px 25px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .current-chat-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .typing-indicator {
            font-size: 12px;
            color: #0088cc;
            font-style: italic;
            margin-top: 3px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            display: flex;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.sent {
            justify-content: flex-end;
        }
        
        .message.received {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        
        .message.sent .message-bubble {
            background: #0088cc;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.received .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }
        
        .input-area {
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }
        
        .send-btn {
            background: #0088cc;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .send-btn:hover {
            background: #006699;
            transform: scale(1.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .modal-buttons button:first-child {
            background: #0088cc;
            color: white;
        }
        
        .empty-chat {
            text-align: center;
            color: #999;
            margin-top: 50px;
        }
        
        @media (max-width: 768px) {
            .app { width: 100%; height: 100vh; border-radius: 0; }
            .sidebar { width: 280px; }
        }
    </style>
</head>
<body>
<div class="app" id="app" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="user-name" id="userName">Загрузка...</div>
            </div>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Поиск собеседника..." id="searchInput" onkeyup="searchUsers()">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
    
    <div class="chat-main">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="avatar" id="chatAvatar">💬</div>
            <div>
                <div class="current-chat-name" id="chatName"></div>
                <div class="typing-indicator" id="typingIndicator"></div>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="empty-chat">👈 Выберите собеседника для начала общения</div>
        </div>
        <div class="input-area" id="inputArea" style="display: none;">
            <textarea class="message-input" id="messageInput" placeholder="Введите сообщение..." rows="1" onkeypress="handleEnter(event)" onkeyup="handleTyping()"></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>Ваш профиль</h3>
        <label>Ваше имя:</label>
        <input type="text" id="profileName" placeholder="Введите имя">
        <label>Аватар (эмодзи):</label>
        <input type="text" id="profileAvatar" placeholder="Например: 😊" maxlength="2">
        <div class="modal-buttons">
            <button onclick="saveSettings()">Сохранить</button>
            <button onclick="closeSettings()">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let ws = null;
    let currentUser = {
        id: 'user_' + Math.random().toString(36).substr(2, 9),
        name: '',
        avatar: '👤'
    };
    
    let users = new Map(); // userId -> {name, avatar, online}
    let messages = new Map(); // userId -> [messages]
    let currentChat = null;
    let typingTimeout = null;
    
    // ========== ПОДКЛЮЧЕНИЕ ==========
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            console.log('✅ Подключено к серверу');
            document.getElementById('app').style.display = 'flex';
            loadUserData();
            
            // Регистрация
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
                case 'registered':
                    console.log('✅ Зарегистрирован как:', currentUser.name);
                    // Запрашиваем список пользователей
                    ws.send(JSON.stringify({ type: 'get_users' }));
                    break;
                    
                case 'user_list':
                    users.clear();
                    data.users.forEach(user => {
                        if (user.id !== currentUser.id) {
                            users.set(user.id, {
                                name: user.name,
                                avatar: user.avatar,
                                online: user.online
                            });
                            if (!messages.has(user.id)) {
                                messages.set(user.id, []);
                            }
                        }
                    });
                    renderUsers();
                    break;
                    
                case 'new_message':
                    if (!messages.has(data.from)) {
                        messages.set(data.from, []);
                    }
                    messages.get(data.from).push({
                        text: data.text,
                        time: data.time,
                        isMine: false,
                        fromName: data.fromName
                    });
                    
                    if (currentChat === data.from) {
                        renderMessages();
                    }
                    renderUsers();
                    
                    // Уведомление
                    if (currentChat !== data.from) {
                        showNotification(`📩 ${data.fromName}: ${data.text}`);
                    }
                    break;
                    
                case 'message_sent':
                    if (currentChat === data.to) {
                        const chatMessages = messages.get(currentChat);
                        const lastMsg = chatMessages[chatMessages.length - 1];
                        if (lastMsg && lastMsg.text === data.text) {
                            lastMsg.time = data.time;
                            renderMessages();
                        }
                    }
                    break;
                    
                case 'typing':
                    if (currentChat === data.from) {
                        const typingDiv = document.getElementById('typingIndicator');
                        if (data.isTyping) {
                            typingDiv.textContent = `${data.fromName} печатает...`;
                        } else {
                            typingDiv.textContent = '';
                        }
                    }
                    break;
            }
        };
        
        ws.onclose = () => {
            console.log('❌ Соединение потеряно');
            setTimeout(connect, 3000);
        };
    }
    
    // ========== ПОЛЬЗОВАТЕЛИ ==========
    function renderUsers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const usersArray = Array.from(users.entries());
        
        const filtered = usersArray.filter(([id, user]) => 
            user.name.toLowerCase().includes(searchTerm)
        );
        
        const container = document.getElementById('usersList');
        container.innerHTML = filtered.map(([id, user]) => {
            const lastMsg = messages.get(id)?.[messages.get(id).length - 1];
            const unread = messages.get(id)?.filter(m => !m.isMine && !m.read).length || 0;
            
            return `
                <div class="user-item ${currentChat === id ? 'active' : ''}" onclick="selectUser('${id}')">
                    <div class="user-avatar">
                        ${user.avatar}
                        ${user.online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="user-info-text">
                        <div class="user-name-text">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.online ? '🟢 онлайн' : '⚫ не в сети'}</div>
                        ${lastMsg ? `<div style="font-size: 11px; color: #666; margin-top: 3px;">${escapeHtml(lastMsg.text.substring(0, 30))}</div>` : ''}
                    </div>
                    ${unread > 0 ? `<div style="background: #ff4757; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px;">${unread}</div>` : ''}
                </div>
            `;
        }).join('');
    }
    
    function selectUser(userId) {
        currentChat = userId;
        const user = users.get(userId);
        
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        document.getElementById('chatName').innerHTML = `${user.avatar} ${escapeHtml(user.name)}`;
        document.getElementById('chatAvatar').textContent = user.avatar;
        
        // Отмечаем сообщения как прочитанные
        if (messages.has(userId)) {
            messages.get(userId).forEach(m => { if (!m.isMine) m.read = true; });
        }
        
        renderMessages();
        renderUsers();
    }
    
    // ========== СООБЩЕНИЯ ==========
    function renderMessages() {
        if (!currentChat) return;
        
        const chatMessages = messages.get(currentChat) || [];
        const container = document.getElementById('messagesArea');
        
        if (chatMessages.length === 0) {
            container.innerHTML = '<div class="empty-chat">💬 Напишите первое сообщение!</div>';
            return;
        }
        
        container.innerHTML = chatMessages.map(msg => `
            <div class="message ${msg.isMine ? 'sent' : 'received'}">
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time || 'только что'}</div>
                </div>
            </div>
        `).join('');
        
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text || !currentChat || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Локально добавляем
        if (!messages.has(currentChat)) messages.set(currentChat, []);
        messages.get(currentChat).push({
            text: text,
            time: time,
            isMine: true
        });
        
        renderMessages();
        renderUsers();
        input.value = '';
        
        // Отправляем на сервер
        ws.send(JSON.stringify({
            type: 'private_message',
            from: currentUser.id,
            to: currentChat,
            fromName: currentUser.name,
            fromAvatar: currentUser.avatar,
            text: text,
            time: time
        }));
        
        // Останавливаем индикатор печати
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChat,
            from: currentUser.id,
            fromName: currentUser.name,
            isTyping: false
        }));
    }
    
    function handleTyping() {
        if (!currentChat || !ws) return;
        
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChat,
            from: currentUser.id,
            fromName: currentUser.name,
            isTyping: true
        }));
        
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            ws.send(JSON.stringify({
                type: 'typing',
                to: currentChat,
                from: currentUser.id,
                fromName: currentUser.name,
                isTyping: false
            }));
        }, 1000);
    }
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    function handleEnter(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }
    
    function searchUsers() {
        renderUsers();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showNotification(msg) {
        if (Notification.permission === 'granted') {
            new Notification(msg);
        } else if (Notification.permission !== 'denied') {
            Notification.requestPermission();
        }
        
        // Визуальное уведомление
        const notif = document.createElement('div');
        notif.textContent = msg;
        notif.style.cssText = `
            position: fixed; bottom: 20px; right: 20px;
            background: #333; color: white; padding: 10px 20px;
            border-radius: 10px; z-index: 9999;
            animation: fadeIn 0.3s;
        `;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }
    
    // ========== НАСТРОЙКИ ==========
    function loadUserData() {
        const saved = localStorage.getItem('messenger_user');
        if (saved) {
            const data = JSON.parse(saved);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            currentUser.avatar = ['😊', '😎', '🤓', '🥳', '😺'][Math.floor(Math.random() * 5)];
        }
        
        document.getElementById('userName').textContent = `${currentUser.avatar} ${currentUser.name}`;
        document.getElementById('userAvatar').textContent = currentUser.avatar;
    }
    
    function saveSettings() {
        const name = document.getElementById('profileName').value.trim();
        const avatar = document.getElementById('profileAvatar').value.trim();
        if (name) currentUser.name = name;
        if (avatar) currentUser.avatar = avatar;
        
        localStorage.setItem('messenger_user', JSON.stringify({
            name: currentUser.name,
            avatar: currentUser.avatar
        }));
        
        closeSettings();
        location.reload();
    }
    
    function openSettings() {
        document.getElementById('profileName').value = currentUser.name;
        document.getElementById('profileAvatar').value = currentUser.avatar;
        document.getElementById('settingsModal').style.display = 'flex';
    }
    
    function closeSettings() {
        document.getElementById('settingsModal').style.display = 'none';
    }
    
    // ЗАПУСК
    connect();
</script>
</body>
</html>
