<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>МЕССЕНДЖЕР</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #17212b;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Основной контейнер */
        .container {
            display: flex;
            height: 100vh;
            background: #17212b;
        }
        
        /* Список чатов (левая панель) */
        .chats-panel {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #2c3a47;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Шапка */
        .header {
            padding: 20px 16px;
            background: #17212b;
            border-bottom: 1px solid #2c3a47;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .user-name {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        
        .edit-btn {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 20px;
            cursor: pointer;
            margin-left: auto;
        }
        
        /* Поиск */
        .search {
            width: 100%;
            padding: 10px 16px;
            background: #1f2a36;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        
        .search::placeholder {
            color: #8e9eae;
        }
        
        /* Список пользователей */
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1f2a36;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .user-item:active {
            background: #2b3a4a;
            transform: scale(0.98);
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 12px;
            position: relative;
        }
        
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4cd137;
            border-radius: 50%;
            border: 2px solid #1f2a36;
        }
        
        .user-name-text {
            color: white;
            font-weight: 500;
            font-size: 16px;
        }
        
        .user-status {
            color: #8e9eae;
            font-size: 12px;
            margin-top: 2px;
        }
        
        /* Правая панель (чат) */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #17212b;
        }
        
        .chat-header {
            padding: 16px 20px;
            background: #1f2a36;
            border-bottom: 1px solid #2c3a47;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-header-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-name {
            color: white;
            font-weight: 600;
            font-size: 17px;
        }
        
        .chat-header-status {
            color: #8e9eae;
            font-size: 12px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 24px;
            cursor: pointer;
            display: none;
        }
        
        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            display: flex;
            animation: fadeIn 0.2s;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.sent {
            justify-content: flex-end;
        }
        
        .message.received {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
        }
        
        .message.sent .message-bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.received .message-bubble {
            background: #1f2a36;
            color: white;
            border-bottom-left-radius: 4px;
        }
        
        .message-text {
            font-size: 15px;
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        
        /* Панель ввода */
        .input-panel {
            padding: 12px 16px;
            background: #1f2a36;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: #17212b;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        
        .send-button {
            width: 44px;
            height: 44px;
            background: #50a6e5;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .send-button:active {
            transform: scale(0.95);
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1f2a36;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 320px;
        }
        
        .modal-content h3 {
            color: white;
            margin-bottom: 16px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #17212b;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .save-btn {
            background: #50a6e5;
            color: white;
        }
        
        .cancel-btn {
            background: #2b3a4a;
            color: #8e9eae;
        }
        
        .empty-state {
            text-align: center;
            color: #8e9eae;
            margin-top: 50px;
        }
        
        .typing-status {
            font-size: 11px;
            color: #50a6e5;
            margin-top: 2px;
        }
        
        /* Адаптив */
        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            
            .chats-panel.open {
                transform: translateX(0);
            }
            
            .back-btn {
                display: block;
            }
            
            .chat-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Левая панель - список чатов -->
    <div class="chats-panel" id="chatsPanel">
        <div class="header">
            <div class="user-info">
                <div class="avatar" id="myAvatar" onclick="openSettings()">👤</div>
                <div class="user-name" id="myName">Загрузка...</div>
                <button class="edit-btn" onclick="openSettings()">⚙️</button>
            </div>
            <input type="text" class="search" id="searchInput" placeholder="Поиск" onkeyup="filterUsers()">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
    
    <!-- Правая панель - чат -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <button class="back-btn" id="backBtn" onclick="closeChat()">←</button>
            <div class="chat-header-avatar" id="chatAvatar">💬</div>
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatName">Мессенджер</div>
                <div class="chat-header-status" id="chatStatus">Выберите чат</div>
                <div class="typing-status" id="typingStatus"></div>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="empty-state">✨ Нажмите на пользователя чтобы начать общение</div>
        </div>
        <div class="input-panel">
            <textarea class="input-field" id="messageInput" placeholder="Сообщение" rows="1" onkeypress="handleEnter(event)" onkeyup="onTyping()"></textarea>
            <button class="send-button" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<!-- Модальное окно настроек -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>Настройки профиля</h3>
        <input type="text" id="editName" placeholder="Ваше имя">
        <input type="text" id="editAvatar" placeholder="Аватар (эмодзи)" maxlength="2">
        <div class="modal-buttons">
            <button class="save-btn" onclick="saveProfile()">Сохранить</button>
            <button class="cancel-btn" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let ws = null;
    let currentUser = {
        id: '',
        name: '',
        avatar: '😊'
    };
    let users = new Map();
    let messages = new Map();
    let currentChatId = null;
    let typingTimeout = null;
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        // Загружаем или создаём ID пользователя
        let savedId = localStorage.getItem('userId');
        if (!savedId) {
            savedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', savedId);
        }
        currentUser.id = savedId;
        
        // Загружаем данные профиля
        let savedData = localStorage.getItem('userData');
        if (savedData) {
            const data = JSON.parse(savedData);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            currentUser.avatar = ['😊', '😎', '🤓', '🥳', '😺'][Math.floor(Math.random() * 5)];
            localStorage.setItem('userData', JSON.stringify({
                name: currentUser.name,
                avatar: currentUser.avatar
            }));
        }
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        
        connect();
    }
    
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = location.host;
        
        ws = new WebSocket(`${protocol}//${host}`);
        
        ws.onopen = function() {
            console.log('✅ Подключено к серверу');
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar
            }));
        };
        
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            console.log('Получено:', data.type);
            
            if (data.type === 'registered') {
                console.log('✅ Зарегистрирован');
            }
            
            if (data.type === 'users') {
                users.clear();
                data.users.forEach(user => {
                    if (user.id !== currentUser.id) {
                        users.set(user.id, {
                            name: user.name,
                            avatar: user.avatar,
                            online: user.online
                        });
                    }
                });
                renderUsers();
            }
            
            if (data.type === 'message') {
                if (!messages.has(data.from)) {
                    messages.set(data.from, []);
                }
                messages.get(data.from).push({
                    text: data.text,
                    time: data.time,
                    isMine: false
                });
                
                if (currentChatId === data.from) {
                    renderMessages();
                } else {
                    // Показываем уведомление
                    const dialog = document.getElementById('usersList');
                    showToast(`📩 ${data.fromName}: ${data.text.substring(0, 30)}`);
                }
                renderUsers();
            }
            
            if (data.type === 'typing') {
                if (currentChatId === data.from) {
                    const typingDiv = document.getElementById('typingStatus');
                    if (data.isTyping) {
                        typingDiv.textContent = '✍️ печатает...';
                    } else {
                        typingDiv.textContent = '';
                    }
                }
            }
        };
        
        ws.onclose = function() {
            console.log('❌ Соединение потеряно');
            setTimeout(connect, 3000);
            showToast('🔄 Переподключение...');
        };
        
        ws.onerror = function(error) {
            console.log('Ошибка:', error);
        };
    }
    
    // ========== ОТРИСОВКА ПОЛЬЗОВАТЕЛЕЙ ==========
    function renderUsers() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('usersList');
        
        const filtered = Array.from(users.entries()).filter(([id, user]) =>
            user.name.toLowerCase().includes(search)
        );
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #8e9eae; padding: 40px;">👥 Нет пользователей</div>';
            return;
        }
        
        container.innerHTML = filtered.map(([id, user]) => {
            const lastMsg = messages.get(id)?.[messages.get(id).length - 1];
            return `
                <div class="user-item" onclick="openChat('${id}')">
                    <div class="user-avatar">
                        ${user.avatar}
                        ${user.online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div style="flex: 1;">
                        <div class="user-name-text">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.online ? '🟢 онлайн' : '⚫ не в сети'}</div>
                        ${lastMsg ? `<div style="font-size: 11px; color: #8e9eae; margin-top: 2px;">${escapeHtml(lastMsg.text.substring(0, 30))}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // ========== ЧАТ ==========
    function openChat(userId) {
        currentChatId = userId;
        const user = users.get(userId);
        
        document.getElementById('chatName').textContent = user.name;
        document.getElementById('chatAvatar').textContent = user.avatar;
        document.getElementById('chatStatus').innerHTML = user.online ? '🟢 онлайн' : '⚫ не в сети';
        
        // На мобильных закрываем панель
        if (window.innerWidth <= 768) {
            document.getElementById('chatsPanel').classList.remove('open');
        }
        
        renderMessages();
        setTimeout(() => document.getElementById('messageInput').focus(), 100);
    }
    
    function closeChat() {
        currentChatId = null;
        document.getElementById('chatName').textContent = 'Мессенджер';
        document.getElementById('chatAvatar').textContent = '💬';
        document.getElementById('chatStatus').innerHTML = 'Выберите чат';
        document.getElementById('messagesArea').innerHTML = '<div class="empty-state">✨ Нажмите на пользователя чтобы начать общение</div>';
    }
    
    function renderMessages() {
        if (!currentChatId) return;
        
        const msgs = messages.get(currentChatId) || [];
        const container = document.getElementById('messagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.isMine ? 'sent' : 'received'}">
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time || 'только что'}</div>
                </div>
            </div>
        `).join('');
        
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text || !currentChatId || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Добавляем сообщение локально
        if (!messages.has(currentChatId)) {
            messages.set(currentChatId, []);
        }
        messages.get(currentChatId).push({
            text: text,
            time: time,
            isMine: true
        });
        
        // Отправляем на сервер
        ws.send(JSON.stringify({
            type: 'message',
            from: currentUser.id,
            to: currentChatId,
            text: text,
            time: time,
            fromName: currentUser.name
        }));
        
        renderMessages();
        renderUsers();
        input.value = '';
        
        // Останавливаем индикатор печати
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChatId,
            from: currentUser.id,
            isTyping: false
        }));
    }
    
    function onTyping() {
        if (!currentChatId || !ws) return;
        
        if (typingTimeout) clearTimeout(typingTimeout);
        
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChatId,
            from: currentUser.id,
            isTyping: true
        }));
        
        typingTimeout = setTimeout(() => {
            ws.send(JSON.stringify({
                type: 'typing',
                to: currentChatId,
                from: currentUser.id,
                isTyping: false
            }));
        }, 1000);
    }
    
    function handleEnter(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }
    
    // ========== ПРОФИЛЬ ==========
    function openSettings() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editAvatar').value = currentUser.avatar;
        document.getElementById('settingsModal').style.display = 'flex';
    }
    
    function saveProfile() {
        const name = document.getElementById('editName').value.trim();
        const avatar = document.getElementById('editAvatar').value.trim();
        
        if (name) currentUser.name = name;
        if (avatar) currentUser.avatar = avatar;
        
        localStorage.setItem('userData', JSON.stringify({
            name: currentUser.name,
            avatar: currentUser.avatar
        }));
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        
        closeModal();
        
        // Переподключаемся с новыми данными
        if (ws) ws.close();
        setTimeout(connect, 500);
    }
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    function filterUsers() {
        renderUsers();
    }
    
    function toggleMenu() {
        document.getElementById('chatsPanel').classList.toggle('open');
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = `
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a36;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 2000;
            font-size: 14px;
            animation: fadeIn 0.3s;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function closeModal() {
        document.getElementById('settingsModal').style.display = 'none';
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Добавляем обработчик для кнопки меню на мобильных
    document.addEventListener('DOMContentLoaded', function() {
        // Создаём кнопку меню для мобильных
        const header = document.querySelector('.chat-header');
        const menuBtn = document.createElement('button');
        menuBtn.textContent = '☰';
        menuBtn.style.cssText = 'background: none; border: none; color: #50a6e5; font-size: 24px; cursor: pointer; margin-right: 12px;';
        menuBtn.onclick = toggleMenu;
        if (window.innerWidth <= 768) {
            header.insertBefore(menuBtn, header.firstChild);
        }
    });
    
    // Запуск
    init();
</script>
</body>
</html>
