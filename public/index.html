<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#17212b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>✨ Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #17212b;
            --header: #1f2a36;
            --bubble-sent: #2b5278;
            --bubble-received: #1f2a36;
            --text: #ffffff;
            --text-secondary: #8e9eae;
            --accent: #50a6e5;
            --divider: #2c3a47;
            --success: #4cd137;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* ========== САЙДБАР ========== */
        .sidebar {
            width: 360px;
            background: var(--bg);
            border-right: 1px solid var(--divider);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            height: 100%;
        }

        .sidebar-header {
            background: var(--header);
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            flex-shrink: 0;
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .avatar:active {
            transform: scale(0.95);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            flex: 1;
            font-weight: 600;
            color: var(--text);
            font-size: 18px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: rgba(80, 166, 229, 0.2);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--divider);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: white;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 4px;
            transition: background 0.2s;
        }

        .user-item:active {
            background: var(--header);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 12px;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 500;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .user-status {
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friend-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        .friend-btn:active {
            opacity: 0.7;
        }

        /* ========== ЧАТ ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            height: 100%;
            position: relative;
        }

        .chat-header {
            background: var(--header);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--divider);
            flex-shrink: 0;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text);
            font-size: 17px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: var(--bubble-sent);
            color: var(--text);
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: var(--bubble-received);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        /* ========== ПАНЕЛЬ ВВОДА - РАБОТАЕТ НА ВСЕХ УСТРОЙСТВАХ ========== */
        .input-panel {
            background: var(--header);
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid var(--divider);
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg);
            border: none;
            border-radius: 25px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            min-height: 44px;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 50px;
            padding: 20px;
        }

        /* ========== МОДАЛЬНЫЕ ОКНА ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--header);
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: var(--text);
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: var(--bg);
            border: 1px solid var(--divider);
            border-radius: 14px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .modal-content input:focus,
        .modal-content textarea:focus {
            border-color: var(--accent);
        }

        /* Аватарки в модалке */
        .avatar-section {
            text-align: center;
            margin: 16px 0;
        }

        .current-avatar-preview {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .current-avatar-preview .avatar {
            width: 80px;
            height: 80px;
            font-size: 40px;
        }

        .avatar-options {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .avatar-option.selected {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .avatar-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .upload-btn {
            background: var(--accent);
            color: white;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            margin: 16px 0;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .upload-btn:active {
            opacity: 0.8;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-primary {
            flex: 1;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
        }

        .btn-secondary {
            flex: 1;
            padding: 14px;
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--divider);
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
        }

        .invite-link {
            background: var(--bg);
            padding: 14px;
            border-radius: 14px;
            margin: 16px 0;
            word-break: break-all;
            font-size: 13px;
            color: var(--accent);
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
            max-width: 90%;
            white-space: normal;
            text-align: center;
            pointer-events: none;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Кнопки для мобильных */
        .menu-toggle, .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            flex-shrink: 0;
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                width: 280px;
                height: 100%;
                z-index: 200;
                transition: left 0.3s ease;
                background: var(--bg);
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .back-btn {
                display: block;
            }
            
            .chat-area {
                width: 100%;
            }
            
            .message-bubble {
                max-width: 85%;
            }
            
            .menu-toggle {
                display: block;
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
            .back-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- САЙДБАР -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile-card">
                <div class="avatar" id="myAvatar" onclick="openProfileModal()">👤</div>
                <div class="profile-name" id="myName">Загрузка...</div>
                <button class="icon-btn" onclick="openSettings()">⚙️</button>
            </div>
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск пользователей..." autocomplete="off">
            <div class="tabs">
                <button class="tab active" data-tab="all" onclick="switchTab('all')">Все</button>
                <button class="tab" data-tab="chats" onclick="switchTab('chats')">Чаты</button>
                <button class="tab" data-tab="friends" onclick="switchTab('friends')">Друзья</button>
            </div>
        </div>
        <div class="users-list" id="usersList">
            <div class="empty-state">👥 Загрузка...</div>
        </div>
    </div>

    <!-- ЧАТ -->
    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">💬</div>
            <div class="chat-info">
                <div class="chat-name" id="chatName">Мессенджер</div>
                <div class="chat-status" id="chatStatus">Выберите чат</div>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="empty-state">✨ Нажмите на пользователя<br>чтобы начать общение</div>
        </div>
        <div class="input-panel" id="inputPanel">
            <input type="text" class="message-input" id="messageInput" placeholder="📝 Сообщение..." autocomplete="off" enterkeyhint="send">
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ ПРОФИЛЯ -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>✏️ Редактировать профиль</h3>
        
        <div class="avatar-section">
            <div class="current-avatar-preview">
                <div class="avatar" id="previewAvatar">😊</div>
            </div>
            <div class="avatar-options" id="avatarOptions"></div>
            <div class="upload-btn" onclick="document.getElementById('photoInput').click()">📷 Загрузить фото</div>
            <input type="file" id="photoInput" accept="image/*" style="display:none">
        </div>
        
        <input type="text" id="editName" placeholder="Ваше имя" autocomplete="off">
        <textarea id="editBio" placeholder="О себе" rows="3"></textarea>
        
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveProfile()">💾 Сохранить</button>
            <button class="btn-secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА НАСТРОЕК -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>⚙️ Настройки</h3>
        <button class="btn-primary" onclick="showInviteLink()" style="width:100%; margin-bottom:12px;">🔗 Моя ссылка-приглашение</button>
        <button class="btn-primary" onclick="openProfileModal()" style="width:100%; margin-bottom:12px;">✏️ Редактировать профиль</button>
        <button class="btn-secondary" onclick="closeModal()" style="width:100%;">Закрыть</button>
    </div>
</div>

<!-- МОДАЛКА ССЫЛКИ -->
<div class="modal" id="inviteModal">
    <div class="modal-content">
        <h3>🔗 Ваша ссылка-приглашение</h3>
        <div class="invite-link" id="inviteLinkBox"></div>
        <button class="btn-primary" onclick="copyInviteLink()">📋 Копировать</button>
        <button class="btn-secondary" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
    let ws = null;
    let currentUser = { id: '', name: '', avatar: '😊', avatarType: 'emoji', bio: '' };
    let allUsers = [];
    let friends = [];
    let messages = {};
    let currentChatId = null;
    let currentTab = 'all';
    let searchResults = [];
    let isSearching = false;
    let selectedAvatar = null;
    let selectedAvatarType = 'emoji';
    let inviteLink = '';

    // ИНИЦИАЛИЗАЦИЯ
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        
        let savedId = localStorage.getItem('userId');
        if (!savedId) {
            savedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', savedId);
        }
        currentUser.id = savedId;
        
        let savedData = localStorage.getItem('userData');
        if (savedData) {
            const data = JSON.parse(savedData);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
            currentUser.avatarType = data.avatarType || 'emoji';
            currentUser.bio = data.bio || '';
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            currentUser.avatar = '😊';
            currentUser.avatarType = 'emoji';
            localStorage.setItem('userData', JSON.stringify(currentUser));
        }
        
        updateAvatarElement('myAvatar', currentUser.avatar, currentUser.avatarType);
        updateAvatarElement('previewAvatar', currentUser.avatar, currentUser.avatarType);
        document.getElementById('myName').textContent = currentUser.name;
        
        connect(refCode);
        
        // Поиск
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length === 0) {
                isSearching = false;
                searchResults = [];
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'get_users', userId: currentUser.id }));
                }
            } else {
                isSearching = true;
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'search_users', userId: currentUser.id, query }));
                }
            }
        });
        
        // Загрузка фото
        document.getElementById('photoInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedAvatar = ev.target.result;
                    selectedAvatarType = 'photo';
                    renderAvatarOptions();
                    updateAvatarElement('previewAvatar', selectedAvatar, 'photo');
                };
                reader.readAsDataURL(file);
            }
        });
        
        renderAvatarOptions();
        
        // Фикс для iOS/Android - скролл при фокусе
        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('focus', () => {
            setTimeout(() => {
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 300);
        });
    }
    
    function renderAvatarOptions() {
        const container = document.getElementById('avatarOptions');
        const emojis = ['😊', '😎', '🤓', '🥳', '😺', '🦊', '🐱', '🐶', '🐼', '🐸', '❤️', '🔥', '⭐', '🎉', '💪'];
        container.innerHTML = emojis.map(emoji => `
            <div class="avatar-option ${selectedAvatar === emoji && selectedAvatarType === 'emoji' ? 'selected' : ''}" 
                 onclick="selectAvatar('${emoji}', 'emoji')">${emoji}</div>
        `).join('');
    }
    
    function selectAvatar(avatar, type) {
        selectedAvatar = avatar;
        selectedAvatarType = type;
        document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
        if (event && event.target) event.target.classList.add('selected');
        updateAvatarElement('previewAvatar', selectedAvatar, selectedAvatarType);
    }
    
    function updateAvatarElement(elementId, avatar, type) {
        const el = document.getElementById(elementId);
        if (!el) return;
        if (type === 'photo' && avatar && avatar.startsWith('data:')) {
            el.innerHTML = `<img src="${avatar}">`;
        } else {
            el.innerHTML = avatar || '😊';
        }
    }
    
    function connect(refCode) {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar,
                avatarType: currentUser.avatarType,
                bio: currentUser.bio,
                refCode: refCode
            }));
        };
        
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            handleMessage(data);
        };
        
        ws.onclose = () => {
            setTimeout(() => connect(null), 3000);
        };
    }
    
    function handleMessage(data) {
        if (data.type === 'registered' && data.userData) {
            currentUser.name = data.userData.name;
            currentUser.avatar = data.userData.avatar;
            currentUser.avatarType = data.userData.avatar_type;
            updateAvatarElement('myAvatar', currentUser.avatar, currentUser.avatarType);
            updateAvatarElement('previewAvatar', currentUser.avatar, currentUser.avatarType);
            document.getElementById('myName').textContent = currentUser.name;
        }
        
        if (data.type === 'users_list' && !isSearching) {
            allUsers = data.users.filter(u => u.id !== currentUser.id);
            renderUsers();
        }
        
        if (data.type === 'search_results') {
            searchResults = data.users;
            renderUsers();
        }
        
        if (data.type === 'friends_list') {
            friends = data.friends;
            renderUsers();
        }
        
        if (data.type === 'friend_added') {
            showToast('✅ Друг добавлен!');
            if (ws) ws.send(JSON.stringify({ type: 'get_friends', userId: currentUser.id }));
        }
        
        if (data.type === 'friend_added_notify') {
            showToast(`✨ ${data.friend.name} присоединился по вашей ссылке!`);
        }
        
        if (data.type === 'invite_link') {
            inviteLink = data.link;
            document.getElementById('inviteLinkBox').innerHTML = inviteLink;
            document.getElementById('inviteModal').style.display = 'flex';
        }
        
        if (data.type === 'chat_history') {
            messages = {};
            data.messages.forEach(msg => {
                const otherId = msg.from_user === currentUser.id ? msg.to_user : msg.from_user;
                if (!messages[otherId]) messages[otherId] = [];
                messages[otherId].push({
                    text: msg.text,
                    time: msg.time,
                    isMine: msg.from_user === currentUser.id
                });
            });
            if (currentChatId) renderMessages();
            renderUsers();
        }
        
        if (data.type === 'new_message') {
            const fromId = data.message.from;
            if (!messages[fromId]) messages[fromId] = [];
            messages[fromId].push({
                text: data.message.text,
                time: data.message.time,
                isMine: false
            });
            if (currentChatId === fromId) {
                renderMessages();
            } else {
                showToast(`📩 ${data.fromName || 'Сообщение'}: ${data.message.text.substring(0, 30)}`);
            }
            renderUsers();
        }
        
        if (data.type === 'profile_updated') showToast('✅ Профиль обновлён');
        if (data.type === 'avatar_updated') showToast('✅ Аватар обновлён');
    }
    
    function renderUsers() {
        const container = document.getElementById('usersList');
        let users = [];
        
        if (isSearching && searchResults.length) users = searchResults;
        else if (currentTab === 'chats') users = Object.keys(messages).map(id => allUsers.find(u => u.id === id)).filter(u => u);
        else if (currentTab === 'friends') users = friends;
        else users = allUsers;
        
        if (!users.length) {
            let emptyText = '👥 Нет пользователей';
            if (currentTab === 'chats') emptyText = '💬 Нет чатов';
            if (currentTab === 'friends') emptyText = '👫 Нет друзей';
            container.innerHTML = `<div class="empty-state">${emptyText}</div>`;
            return;
        }
        
        container.innerHTML = users.map(user => {
            const isFriend = friends.some(f => f.id === user.id);
            const lastMsg = messages[user.id]?.[messages[user.id].length - 1];
            const avatarHtml = (user.avatar_type === 'photo' && user.avatar) ? `<img src="${user.avatar}">` : (user.avatar || '😊');
            return `
                <div class="user-item" onclick="openChat('${user.id}', '${escapeHtml(user.name)}', '${user.avatar || '😊'}', '${user.avatar_type || 'emoji'}')">
                    <div class="user-avatar">
                        ${avatarHtml}
                        ${user.online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-status">${user.online ? '🟢 онлайн' : '⚫ не в сети'}${lastMsg ? ` • ${escapeHtml(lastMsg.text.substring(0, 20))}` : ''}</div>
                    </div>
                    ${!isFriend && currentTab !== 'friends' && currentTab !== 'chats' ? 
                        `<button class="friend-btn" onclick="event.stopPropagation(); addFriend('${user.id}')">➕ Друг</button>` : ''}
                </div>
            `;
        }).join('');
    }
    
    function openChat(userId, name, avatar, avatarType) {
        currentChatId = userId;
        document.getElementById('chatName').textContent = name;
        if (avatarType === 'photo' && avatar && avatar.startsWith('data:')) {
            document.getElementById('chatAvatar').innerHTML = `<img src="${avatar}">`;
        } else {
            document.getElementById('chatAvatar').innerHTML = avatar || '💬';
        }
        
        const user = allUsers.find(u => u.id === userId) || friends.find(f => f.id === userId);
        document.getElementById('chatStatus').innerHTML = user?.online ? '🟢 онлайн' : '⚫ не в сети';
        
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        renderMessages();
        setTimeout(() => {
            document.getElementById('messageInput').focus();
        }, 200);
    }
    
    function closeChat() {
        currentChatId = null;
        document.getElementById('chatName').textContent = 'Мессенджер';
        document.getElementById('chatAvatar').innerHTML = '💬';
        document.getElementById('chatStatus').innerHTML = 'Выберите чат';
        document.getElementById('messagesArea').innerHTML = '<div class="empty-state">✨ Нажмите на пользователя<br>чтобы начать общение</div>';
    }
    
    function renderMessages() {
        if (!currentChatId) return;
        const msgs = messages[currentChatId] || [];
        const container = document.getElementById('messagesArea');
        if (!msgs.length) {
            container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
            return;
        }
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.isMine ? 'sent' : 'received'}">
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time || 'сейчас'}</div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId || !ws || ws.readyState !== WebSocket.OPEN) return;
        
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if (!messages[currentChatId]) messages[currentChatId] = [];
        messages[currentChatId].push({ text, time, isMine: true });
        
        ws.send(JSON.stringify({
            type: 'message',
            from: currentUser.id,
            to: currentChatId,
            text: text,
            fromName: currentUser.name,
            fromAvatar: currentUser.avatar
        }));
        
        renderMessages();
        renderUsers();
        input.value = '';
        
        setTimeout(() => {
            const area = document.getElementById('messagesArea');
            area.scrollTop = area.scrollHeight;
        }, 50);
    }
    
    function addFriend(userId) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'add_friend', userId: currentUser.id, friendId: userId }));
        }
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        renderUsers();
    }
    
    function showInviteLink() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'get_invite_link', userId: currentUser.id, baseUrl: window.location.origin }));
        }
        closeModal();
    }
    
    function copyInviteLink() {
        navigator.clipboard.writeText(inviteLink);
        showToast('✅ Ссылка скопирована!');
        closeModal();
    }
    
    function saveProfile() {
        const name = document.getElementById('editName').value.trim();
        if (!name) return showToast('❌ Введите имя');
        
        currentUser.name = name;
        currentUser.bio = document.getElementById('editBio').value;
        if (selectedAvatar) {
            currentUser.avatar = selectedAvatar;
            currentUser.avatarType = selectedAvatarType;
        }
        
        localStorage.setItem('userData', JSON.stringify({
            name: currentUser.name,
            avatar: currentUser.avatar,
            avatarType: currentUser.avatarType,
            bio: currentUser.bio
        }));
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'update_profile', userId: currentUser.id, name: currentUser.name, bio: currentUser.bio }));
            ws.send(JSON.stringify({ type: 'update_avatar', userId: currentUser.id, avatar: currentUser.avatar, avatarType: currentUser.avatarType }));
        }
        
        updateAvatarElement('myAvatar', currentUser.avatar, currentUser.avatarType);
        document.getElementById('myName').textContent = currentUser.name;
        closeModal();
        showToast('✅ Профиль сохранён');
        
        // Обновляем аватар в чате если открыт
        if (currentChatId) {
            const user = allUsers.find(u => u.id === currentChatId);
            if (user) {
                document.getElementById('chatName').textContent = user.name;
            }
        }
    }
    
    function openProfileModal() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editBio').value = currentUser.bio || '';
        selectedAvatar = currentUser.avatar;
        selectedAvatarType = currentUser.avatarType;
        renderAvatarOptions();
        updateAvatarElement('previewAvatar', selectedAvatar, selectedAvatarType);
        document.getElementById('profileModal').style.display = 'flex';
        closeModal();
    }
    
    function openSettings() {
        closeModal();
        document.getElementById('settingsModal').style.display = 'flex';
    }
    
    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('open');
    }
    
    function closeModal() { 
        document.getElementById('profileModal').style.display = 'none';
        document.getElementById('settingsModal').style.display = 'none';
        document.getElementById('inviteModal').style.display = 'none';
    }
    
    function handleEnter(e) { 
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) { 
            return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; 
        });
    }
    
    init();
</script>
</body>
</html>
