<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#17212b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>✨ Мессенджер ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Основные переменные */
        :root {
            --bg: #17212b;
            --header: #1f2a36;
            --bubble-sent: #2b5278;
            --bubble-received: #1f2a36;
            --text: #ffffff;
            --text-secondary: #8e9eae;
            --accent: #50a6e5;
            --divider: #2c3a47;
            --success: #4cd137;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Главный контейнер */
        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }

        /* Боковая панель (диалоги) */
        .dialogs {
            width: 100%;
            max-width: 360px;
            background: var(--bg);
            border-right: 1px solid var(--divider);
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 200;
            background: var(--bg);
        }

        .dialogs.open {
            transform: translateX(0);
        }

        /* Шапка диалогов */
        .dialogs-header {
            background: var(--header);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--divider);
        }

        .profile-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
        }

        .profile-name {
            font-weight: 600;
            color: var(--text);
            font-size: 17px;
        }

        .profile-status {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
            min-width: 44px;
            min-height: 44px;
        }

        /* Поиск */
        .search-box {
            margin-top: 12px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--divider);
            border-radius: 30px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        /* Списки */
        .dialogs-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .dialog-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--divider);
            min-height: 72px;
        }

        .dialog-item:active {
            background: var(--header);
        }

        .dialog-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-right: 12px;
            position: relative;
            flex-shrink: 0;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        .dialog-info {
            flex: 1;
            min-width: 0;
        }

        .dialog-name {
            font-weight: 500;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 4px;
        }

        .dialog-last {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            width: 100%;
        }

        .chat-header {
            background: var(--header);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--divider);
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text);
            font-size: 17px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: var(--bubble-sent);
            color: var(--text);
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: var(--bubble-received);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        /* Панель ввода */
        .input-panel {
            background: var(--header);
            padding: 10px 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border-top: 1px solid var(--divider);
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg);
            border: none;
            border-radius: 25px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 100px;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Пустые состояния */
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 50px;
            padding: 20px;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--header);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
            max-width: 90%;
            white-space: normal;
            text-align: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--header);
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 320px;
        }

        .modal-content h3 {
            color: var(--text);
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg);
            border: none;
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text-secondary);
        }

        /* Адаптация для больших экранов */
        @media (min-width: 768px) {
            .dialogs {
                transform: translateX(0);
                position: relative;
                width: 360px;
            }
            .menu-toggle {
                display: none;
            }
            .chat-area {
                width: calc(100% - 360px);
            }
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 767px) {
            .dialogs {
                width: 85%;
                max-width: 320px;
            }
            .message-bubble {
                max-width: 85%;
            }
            .dialog-avatar {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
        }

        /* Адаптация для iPhone с вырезом */
        @supports (padding: max(0px)) {
            .dialogs-header,
            .chat-header {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
            }
            .input-panel {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
            }
        }

        /* Стили для скролла (красивые) */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--divider);
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Боковая панель с диалогами -->
    <div class="dialogs" id="dialogs">
        <div class="dialogs-header">
            <div class="profile-info">
                <div class="profile-left">
                    <div class="avatar" id="myAvatar" onclick="openProfile()">👤</div>
                    <div>
                        <div class="profile-name" id="myName">Загрузка...</div>
                        <div class="profile-status" id="myStatus">онлайн</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="openProfile()">⚙️</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск" onkeyup="searchUsers()">
            </div>
        </div>
        <div class="dialogs-list" id="dialogsList">
            <div class="empty-state">👥 Поиск пользователей...</div>
        </div>
    </div>
    
    <!-- Область чата -->
    <div class="chat-area">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleDialogs()">☰</button>
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">💬</div>
            <div class="chat-info">
                <div class="chat-name" id="chatName">Мессенджер</div>
                <div class="chat-status" id="chatStatus">Выберите чат</div>
            </div>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="empty-state">✨ Нажмите на пользователя<br>чтобы начать общение</div>
        </div>
        
        <div class="input-panel">
            <textarea class="input-field" id="messageInput" placeholder="Сообщение" rows="1" onkeypress="handleEnter(event)"></textarea>
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<!-- Модальное окно профиля -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>📝 Настройки</h3>
        <input type="text" id="editName" placeholder="Ваше имя">
        <input type="text" id="editAvatar" placeholder="Аватар (эмодзи)" maxlength="2">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let currentUser = { id: '', name: '', avatar: '😊' };
    let users = [];
    let messages = {};
    let currentChatId = null;
    let searchTimeout = null;
    
    // Инициализация
    function init() {
        let savedId = localStorage.getItem('userId');
        if (!savedId) {
            savedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', savedId);
        }
        currentUser.id = savedId;
        
        let savedData = localStorage.getItem('userData');
        if (savedData) {
            const data = JSON.parse(savedData);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            currentUser.avatar = ['😊', '😎', '🤓', '🥳'][Math.floor(Math.random() * 4)];
            localStorage.setItem('userData', JSON.stringify({ name: currentUser.name, avatar: currentUser.avatar }));
        }
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        connect();
        
        // Закрываем панель при клике вне её на телефоне
        document.addEventListener('click', function(e) {
            const dialogs = document.getElementById('dialogs');
            if (window.innerWidth <= 768 && dialogs.classList.contains('open')) {
                if (!dialogs.contains(e.target) && !e.target.classList.contains('menu-toggle')) {
                    dialogs.classList.remove('open');
                }
            }
        });
    }
    
    // Подключение к серверу
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'users_list') {
                users = data.users.filter(u => u.id !== currentUser.id);
                renderUsers();
            }
            
            if (data.type === 'search_results') {
                users = data.users;
                renderUsers();
                if (data.query && data.query.length > 0) {
                    showToast(`🔍 Найдено ${data.users.length} пользователей`);
                }
            }
            
            if (data.type === 'new_message') {
                if (!messages[data.from]) messages[data.from] = [];
                messages[data.from].push({
                    text: data.text,
                    time: data.time,
                    isMine: false
                });
                if (currentChatId === data.from) {
                    renderMessages();
                } else {
                    showToast(`📩 ${data.fromName}: ${data.text.substring(0, 30)}`);
                }
                renderUsers();
            }
        };
        
        ws.onclose = () => {
            setTimeout(connect, 3000);
            showToast('🔄 Переподключение...');
        };
    }
    
    // Поиск пользователей
    function searchUsers() {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) {
                ws.send(JSON.stringify({ type: 'get_users' }));
                return;
            }
            ws.send(JSON.stringify({
                type: 'search_users',
                userId: currentUser.id,
                query: query
            }));
        }, 500);
    }
    
    // Отображение списка пользователей
    function renderUsers() {
        const container = document.getElementById('dialogsList');
        
        if (users.length === 0) {
            container.innerHTML = '<div class="empty-state">👥 Нет других пользователей<br>Пригласи друзей по ссылке!</div>';
            return;
        }
        
        container.innerHTML = users.map(user => {
            const userMessages = messages[user.id] || [];
            const lastMsg = userMessages[userMessages.length - 1];
            return `
                <div class="dialog-item" onclick="openChat('${user.id}', '${escapeHtml(user.name)}', '${user.avatar}')">
                    <div class="dialog-avatar">
                        ${user.avatar}
                        ${user.online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="dialog-info">
                        <div class="dialog-name">${escapeHtml(user.name)}</div>
                        <div class="dialog-last">
                            ${user.online ? '🟢 онлайн' : '⚫ не в сети'}
                            ${lastMsg ? ` • ${escapeHtml(lastMsg.text.substring(0, 30))}` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // Открытие чата
    function openChat(userId, name, avatar) {
        currentChatId = userId;
        document.getElementById('chatName').textContent = name;
        document.getElementById('chatAvatar').textContent = avatar;
        document.getElementById('chatStatus').innerHTML = 'онлайн';
        
        // Закрываем панель на телефонах
        if (window.innerWidth <= 768) {
            document.getElementById('dialogs').classList.remove('open');
        }
        
        renderMessages();
        setTimeout(() => document.getElementById('messageInput').focus(), 100);
    }
    
    // Закрытие чата
    function closeChat() {
        currentChatId = null;
        document.getElementById('chatName').textContent = 'Мессенджер';
        document.getElementById('chatAvatar').textContent = '💬';
        document.getElementById('chatStatus').innerHTML = 'Выберите чат';
        document.getElementById('messagesArea').innerHTML = '<div class="empty-state">✨ Нажмите на пользователя<br>чтобы начать общение</div>';
    }
    
    // Отображение сообщений
    function renderMessages() {
        if (!currentChatId) return;
        const msgs = messages[currentChatId] || [];
        const container = document.getElementById('messagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.isMine ? 'sent' : 'received'}">
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time || 'только что'}</div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    // Отправка сообщения
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        
        if (!messages[currentChatId]) messages[currentChatId] = [];
        messages[currentChatId].push({
            text: text,
            time: time,
            isMine: true
        });
        
        ws.send(JSON.stringify({
            type: 'message',
            from: currentUser.id,
            to: currentChatId,
            text: text,
            time: time,
            fromName: currentUser.name
        }));
        
        renderMessages();
        renderUsers();
        input.value = '';
        
        // Авто-высота для textarea
        input.style.height = 'auto';
    }
    
    // Авто-высота для textarea
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
    
    // Обработка Enter
    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        autoResize(e.target);
    }
    
    // Открытие настроек профиля
    function openProfile() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editAvatar').value = currentUser.avatar;
        document.getElementById('profileModal').style.display = 'flex';
    }
    
    // Сохранение профиля
    function saveProfile() {
        const name = document.getElementById('editName').value.trim();
        const avatar = document.getElementById('editAvatar').value.trim();
        if (name) currentUser.name = name;
        if (avatar) currentUser.avatar = avatar;
        
        localStorage.setItem('userData', JSON.stringify({ name: currentUser.name, avatar: currentUser.avatar }));
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        closeModal();
        showToast('✅ Профиль обновлён');
        
        // Переподключаемся с новыми данными
        if (ws) ws.close();
        setTimeout(() => connect(), 500);
    }
    
    // Открыть/закрыть боковую панель
    function toggleDialogs() {
        document.getElementById('dialogs').classList.toggle('open');
    }
    
    // Закрыть модальное окно
    function closeModal() {
        document.getElementById('profileModal').style.display = 'none';
    }
    
    // Показать уведомление
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // Экранирование HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Запуск
    init();
</script>
</body>
</html>
