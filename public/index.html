<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#17212b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Telegram Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Telegram цвета */
        :root {
            --tg-bg: #17212b;
            --tg-header: #17212b;
            --tg-panel: #1f2a36;
            --tg-bubble-sent: #2b5278;
            --tg-bubble-received: #1f2a36;
            --tg-text: #ffffff;
            --tg-text-secondary: #8e9eae;
            --tg-accent: #50a6e5;
            --tg-divider: #2c3a47;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--tg-bg);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Основной контейнер */
        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            position: relative;
        }

        /* Боковая панель (диалоги) */
        .dialogs {
            width: 100%;
            max-width: 360px;
            background: var(--tg-bg);
            border-right: 1px solid var(--tg-divider);
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            background: var(--tg-bg);
        }

        .dialogs.open {
            transform: translateX(0);
        }

        @media (min-width: 768px) {
            .dialogs {
                transform: translateX(0);
                position: relative;
                width: 360px;
            }
            .menu-toggle {
                display: none;
            }
        }

        /* Шапка диалогов */
        .dialogs-header {
            background: var(--tg-header);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--tg-divider);
        }

        .profile-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        .profile-name {
            font-weight: 600;
            font-size: 17px;
            color: var(--tg-text);
        }

        .header-buttons {
            display: flex;
            gap: 16px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--tg-accent);
            font-size: 22px;
            cursor: pointer;
        }

        /* Поиск */
        .search-container {
            margin-top: 12px;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: var(--tg-panel);
            border: none;
            border-radius: 30px;
            color: var(--tg-text);
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--tg-text-secondary);
        }

        /* Список диалогов */
        .dialogs-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .dialog-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--tg-divider);
            position: relative;
        }

        .dialog-item:active {
            background: var(--tg-panel);
        }

        .dialog-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-right: 12px;
            position: relative;
            flex-shrink: 0;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #4cd137;
            border-radius: 50%;
            border: 2px solid var(--tg-bg);
        }

        .dialog-info {
            flex: 1;
            min-width: 0;
        }

        .dialog-name {
            font-weight: 500;
            color: var(--tg-text);
            font-size: 16px;
            margin-bottom: 4px;
        }

        .dialog-last-message {
            font-size: 13px;
            color: var(--tg-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dialog-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .dialog-time {
            font-size: 11px;
            color: var(--tg-text-secondary);
        }

        .unread-count {
            background: var(--tg-accent);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--tg-bg);
            position: relative;
        }

        .chat-header {
            background: var(--tg-header);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--tg-divider);
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--tg-accent);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--tg-accent);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: none;
        }

        @media (max-width: 768px) {
            .back-btn {
                display: block;
            }
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: var(--tg-text);
            font-size: 17px;
        }

        .chat-status {
            font-size: 12px;
            color: var(--tg-text-secondary);
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 16px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: var(--tg-bubble-sent);
            color: var(--tg-text);
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: var(--tg-bubble-received);
            color: var(--tg-text);
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        /* Панель ввода */
        .input-area {
            background: var(--tg-panel);
            padding: 8px 12px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .attach-btn, .emoji-btn, .voice-btn {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .attach-btn:active, .emoji-btn:active, .voice-btn:active {
            color: var(--tg-accent);
            transform: scale(0.95);
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--tg-bg);
            border: none;
            border-radius: 22px;
            color: var(--tg-text);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 100px;
        }

        .send-btn {
            background: var(--tg-accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--tg-panel);
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 340px;
        }

        .modal-content h3 {
            color: var(--tg-text);
            margin-bottom: 16px;
            font-size: 18px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: var(--tg-bg);
            border: none;
            border-radius: 12px;
            color: var(--tg-text);
            font-size: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--tg-accent);
            color: white;
        }

        .btn-danger {
            background: #e53935;
            color: white;
        }

        .btn-secondary {
            background: var(--tg-bg);
            color: var(--tg-text-secondary);
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--tg-panel);
            color: var(--tg-text);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Пустые состояния */
        .empty-state {
            text-align: center;
            color: var(--tg-text-secondary);
            margin-top: 50px;
            padding: 20px;
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .chat-area {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Список диалогов -->
    <div class="dialogs" id="dialogs">
        <div class="dialogs-header">
            <div class="profile-info">
                <div class="profile-left">
                    <div class="profile-avatar" id="profileAvatar" onclick="openProfileModal()">👤</div>
                    <div class="profile-name" id="profileName">Загрузка...</div>
                </div>
                <div class="header-buttons">
                    <button class="header-btn" onclick="createNewGroup()">✏️</button>
                    <button class="header-btn" onclick="openSettings()">⚙️</button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск" onkeyup="searchDialogs()">
            </div>
        </div>
        <div class="dialogs-list" id="dialogsList"></div>
    </div>
    
    <!-- Область чата -->
    <div class="chat-area">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleDialogs()">☰</button>
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">💬</div>
            <div class="chat-info">
                <div class="chat-name" id="chatName">Telegram</div>
                <div class="chat-status" id="chatStatus">онлайн</div>
            </div>
            <div class="chat-actions">
                <button class="attach-btn" onclick="showUserActions()" id="actionBtn" style="width: 44px; font-size: 20px;">⋮</button>
            </div>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="empty-state">✨ Добро пожаловать в Telegram Clone!<br>Выберите диалог для начала общения</div>
        </div>
        
        <div class="input-area">
            <button class="attach-btn" onclick="attachFile()">📎</button>
            <button class="emoji-btn" onclick="showEmojiPicker()">😊</button>
            <textarea class="message-input" id="messageInput" placeholder="Сообщение" rows="1" onkeypress="handleEnter(event)" onkeyup="autoResize(this)"></textarea>
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<!-- Модальные окна -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>Редактировать профиль</h3>
        <input type="text" id="editName" placeholder="Имя">
        <input type="text" id="editAvatar" placeholder="Аватар (эмодзи)" maxlength="2">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="updateProfile()">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal('profileModal')">Отмена</button>
        </div>
    </div>
</div>

<div class="modal" id="groupModal">
    <div class="modal-content">
        <h3>Новая группа</h3>
        <input type="text" id="groupName" placeholder="Название группы">
        <input type="text" id="groupAvatar" placeholder="Аватар" maxlength="2">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="createGroup()">Создать</button>
            <button class="btn-secondary" onclick="closeModal('groupModal')">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let ws = null;
    let currentUser = {
        id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
        name: '',
        avatar: '😎',
        isAdmin: false
    };
    
    let users = new Map();
    let dialogs = new Map(); // userId -> {name, avatar, online, lastMessage, time, unread}
    let messages = new Map(); // userId -> messages[]
    let currentChat = null;
    let typingTimeout = null;
    
    // ========== ПОДКЛЮЧЕНИЕ ==========
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            loadUserData();
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            switch(data.type) {
                case 'registered':
                    currentUser.isAdmin = data.isAdmin;
                    ws.send(JSON.stringify({ type: 'get_users' }));
                    showToast(`Добро пожаловать, ${data.userName}`);
                    break;
                    
                case 'user_list':
                    users.clear();
                    data.users.forEach(user => {
                        if (user.id !== currentUser.id) {
                            users.set(user.id, {
                                name: user.name,
                                avatar: user.avatar,
                                online: user.online,
                                isAdmin: user.isAdmin,
                                lastSeen: user.lastSeen
                            });
                            if (!messages.has(user.id)) messages.set(user.id, []);
                            updateDialog(user.id);
                        }
                    });
                    renderDialogs();
                    break;
                    
                case 'new_message':
                    const fromUserId = data.from;
                    if (!messages.has(fromUserId)) messages.set(fromUserId, []);
                    messages.get(fromUserId).push({
                        id: data.messageId,
                        text: data.text,
                        time: data.time,
                        isMine: false,
                        fromName: data.fromName
                    });
                    updateDialog(fromUserId, data.text, data.time);
                    if (currentChat === fromUserId) {
                        renderMessages();
                        markAsRead(fromUserId);
                    } else {
                        const dialog = dialogs.get(fromUserId);
                        if (dialog) dialog.unread = (dialog.unread || 0) + 1;
                        renderDialogs();
                        showToast(`📩 ${data.fromName}: ${data.text.substring(0, 30)}`);
                    }
                    break;
                    
                case 'message_sent':
                    if (currentChat === data.to) {
                        const msgs = messages.get(currentChat);
                        if (msgs && msgs.length > 0) {
                            msgs[msgs.length - 1].time = data.time;
                            renderMessages();
                        }
                    }
                    break;
                    
                case 'typing':
                    if (currentChat === data.from) {
                        const statusDiv = document.getElementById('chatStatus');
                        if (data.isTyping) statusDiv.innerHTML = '✍️ печатает...';
                        else {
                            const user = users.get(data.from);
                            statusDiv.innerHTML = user?.online ? '🟢 онлайн' : '⚫ не в сети';
                        }
                    }
                    break;
                    
                case 'profile_updated':
                    if (users.has(currentUser.id)) {
                        currentUser.name = data.name;
                        currentUser.avatar = data.avatar;
                        document.getElementById('profileName').textContent = data.name;
                        document.getElementById('profileAvatar').textContent = data.avatar;
                        showToast('Профиль обновлён');
                    }
                    break;
                    
                case 'system_message':
                    showToast(data.text);
                    break;
                    
                case 'chat_history':
                    if (data.withUser === currentChat) {
                        messages.set(currentChat, data.messages || []);
                        renderMessages();
                    }
                    break;
            }
        };
        
        ws.onclose = () => setTimeout(connect, 3000);
    }
    
    // ========== ДИАЛОГИ ==========
    function updateDialog(userId, lastMsg = null, time = null) {
        const user = users.get(userId);
        if (!user) return;
        
        const msgs = messages.get(userId) || [];
        const lastMessage = lastMsg || (msgs.length > 0 ? msgs[msgs.length - 1].text : '');
        const lastTime = time || (msgs.length > 0 ? msgs[msgs.length - 1].time : '');
        const unread = msgs.filter(m => !m.isMine && !m.read).length;
        
        dialogs.set(userId, {
            name: user.name,
            avatar: user.avatar,
            online: user.online,
            lastMessage: lastMessage,
            time: lastTime,
            unread: unread
        });
    }
    
    function renderDialogs() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('dialogsList');
        
        const sorted = Array.from(dialogs.entries()).sort((a, b) => 
            (b[1].time || '').localeCompare(a[1].time || '')
        );
        
        const filtered = sorted.filter(([id, dialog]) =>
            dialog.name.toLowerCase().includes(search)
        );
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет диалогов</div>';
            return;
        }
        
        container.innerHTML = filtered.map(([id, dialog]) => `
            <div class="dialog-item" onclick="openChat('${id}')">
                <div class="dialog-avatar">
                    ${dialog.avatar}
                    ${dialog.online ? '<div class="online-dot"></div>' : ''}
                </div>
                <div class="dialog-info">
                    <div class="dialog-name">${escapeHtml(dialog.name)}</div>
                    <div class="dialog-last-message">${escapeHtml(dialog.lastMessage?.substring(0, 50) || 'Нажмите для чата')}</div>
                </div>
                <div class="dialog-meta">
                    <div class="dialog-time">${dialog.time || ''}</div>
                    ${dialog.unread > 0 ? `<div class="unread-count">${dialog.unread}</div>` : ''}
                </div>
            </div>
        `).join('');
    }
    
    function openChat(userId) {
        currentChat = userId;
        const user = users.get(userId);
        const dialog = dialogs.get(userId);
        
        document.getElementById('chatAvatar').textContent = user.avatar;
        document.getElementById('chatName').textContent = user.name;
        document.getElementById('chatStatus').innerHTML = user.online ? '🟢 онлайн' : '⚫ не в сети';
        
        if (dialog) dialog.unread = 0;
        
        if (window.innerWidth <= 768) {
            document.getElementById('dialogs').classList.remove('open');
        }
        
        // Запрашиваем историю
        ws.send(JSON.stringify({
            type: 'get_history',
            userId: currentUser.id,
            withUserId: userId
        }));
        
        markAsRead(userId);
        renderDialogs();
        renderMessages();
        
        setTimeout(() => document.getElementById('messageInput').focus(), 200);
    }
    
    function closeChat() {
        currentChat = null;
        document.getElementById('chatName').textContent = 'Telegram';
        document.getElementById('chatAvatar').textContent = '💬';
        document.getElementById('chatStatus').innerHTML = 'онлайн';
        document.getElementById('messagesArea').innerHTML = '<div class="empty-state">✨ Выберите диалог для начала общения</div>';
        document.getElementById('messageInput').value = '';
    }
    
    // ========== СООБЩЕНИЯ ==========
    function renderMessages() {
        if (!currentChat) return;
        
        const msgs = messages.get(currentChat) || [];
        const container = document.getElementById('messagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.isMine ? 'sent' : 'received'}">
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time || 'только что'}</div>
                </div>
            </div>
        `).join('');
        
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text || !currentChat || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if (!messages.has(currentChat)) messages.set(currentChat, []);
        messages.get(currentChat).push({
            text: text,
            time: time,
            isMine: true
        });
        
        ws.send(JSON.stringify({
            type: 'private_message',
            from: currentUser.id,
            to: currentChat,
            fromName: currentUser.name,
            fromAvatar: currentUser.avatar,
            text: text,
            time: time
        }));
        
        updateDialog(currentChat, text, time);
        renderMessages();
        renderDialogs();
        input.value = '';
        autoResize(input);
        
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChat,
            from: currentUser.id,
            fromName: currentUser.name,
            isTyping: false
        }));
    }
    
    function markAsRead(userId) {
        ws.send(JSON.stringify({
            type: 'mark_read',
            userId: currentUser.id,
            otherId: userId
        }));
    }
    
    // ========== ПРОФИЛЬ ==========
    function loadUserData() {
        const saved = localStorage.getItem('tg_user');
        if (saved) {
            const data = JSON.parse(saved);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
            currentUser.id = data.id || currentUser.id;
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
        }
        document.getElementById('profileName').textContent = currentUser.name;
        document.getElementById('profileAvatar').textContent = currentUser.avatar;
    }
    
    function updateProfile() {
        const name = document.getElementById('editName').value.trim();
        const avatar = document.getElementById('editAvatar').value.trim();
        
        if (name) currentUser.name = name;
        if (avatar) currentUser.avatar = avatar;
        
        localStorage.setItem('tg_user', JSON.stringify({
            id: currentUser.id,
            name: currentUser.name,
            avatar: currentUser.avatar
        }));
        
        ws.send(JSON.stringify({
            type: 'update_profile',
            userId: currentUser.id,
            name: currentUser.name,
            avatar: currentUser.avatar
        }));
        
        closeModal('profileModal');
    }
    
    function openProfileModal() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editAvatar').value = currentUser.avatar;
        document.getElementById('profileModal').style.display = 'flex';
    }
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    function toggleDialogs() {
        document.getElementById('dialogs').classList.toggle('open');
    }
    
    function searchDialogs() {
        renderDialogs();
    }
    
    function showEmojiPicker() {
        const emojis = ['😊', '😂', '❤️', '👍', '🎉', '🔥', '✨', '💯', '😎', '🥳', '🤣', '😍', '😭', '😱', '🙏'];
        const picker = document.createElement('div');
        picker.style.cssText = `
            position: fixed; bottom: 80px; left: 16px;
            background: var(--tg-panel); padding: 12px;
            border-radius: 20px; display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px; z-index: 1000;
            border: 1px solid var(--tg-divider);
        `;
        emojis.forEach(emoji => {
            const btn = document.createElement('button');
            btn.textContent = emoji;
            btn.style.cssText = `
                background: none; border: none; font-size: 28px;
                cursor: pointer; padding: 8px; border-radius: 12px;
            `;
            btn.onclick = () => {
                const input = document.getElementById('messageInput');
                input.value += emoji;
                input.focus();
                picker.remove();
            };
            picker.appendChild(btn);
        });
        document.body.appendChild(picker);
        const close = () => picker.remove();
        setTimeout(close, 5000);
        picker.addEventListener('click', (e) => e.stopPropagation());
    }
    
    function createNewGroup() {
        document.getElementById('groupModal').style.display = 'flex';
    }
    
    function createGroup() {
        const name = document.getElementById('groupName').value.trim();
        if (!name) {
            showToast('Введите название группы');
            return;
        }
        ws.send(JSON.stringify({
            type: 'create_group',
            creatorId: currentUser.id,
            groupName: name,
            groupAvatar: document.getElementById('groupAvatar').value.trim() || '👥',
            members: []
        }));
        closeModal('groupModal');
        showToast('Группа создана');
    }
    
    function showUserActions() {
        if (currentChat && users.get(currentChat)?.isAdmin && currentUser.isAdmin) {
            showToast('Админ-панель в разработке');
        }
    }
    
    function attachFile() {
        showToast('Отправка файлов в разработке');
    }
    
    function openSettings() {
        openProfileModal();
    }
    
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
    
    function handleEnter(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ========== ЗАПУСК ==========
    connect();
</script>
</body>
</html>
