<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MEGA Messenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #17212b;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        
        /* Sidebar */
        .sidebar {
            width: 100%;
            max-width: 360px;
            background: #17212b;
            border-right: 1px solid #2c3a47;
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.3s;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }
        
        .sidebar.open { transform: translateX(0); }
        
        @media (min-width: 768px) {
            .sidebar { transform: translateX(0); position: relative; width: 360px; }
            .menu-toggle { display: none; }
        }
        
        /* Header */
        .sidebar-header {
            background: #17212b;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid #2c3a47;
        }
        
        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .profile-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .name {
            font-weight: 600;
            color: white;
            font-size: 17px;
        }
        
        .status-text {
            font-size: 12px;
            color: #8e9eae;
        }
        
        .icon-btn {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }
        
        /* Search */
        .search-box {
            margin-top: 12px;
        }
        
        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: #1f2a36;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .search-input::placeholder { color: #8e9eae; }
        
        /* Tabs */
        .tabs {
            display: flex;
            background: #17212b;
            border-bottom: 1px solid #2c3a47;
            margin-top: 12px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: #8e9eae;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tab.active {
            color: #50a6e5;
            border-bottom: 2px solid #50a6e5;
        }
        
        /* Lists */
        .dialogs-list, .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .dialog, .contact-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1f2a36;
            border-radius: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .dialog:active, .contact-item:active { background: #2b3a4a; }
        
        .dialog-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-right: 12px;
            position: relative;
            flex-shrink: 0;
        }
        
        .online-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #4cd137;
            border-radius: 50%;
            border: 2px solid #1f2a36;
        }
        
        .dialog-info { flex: 1; min-width: 0; }
        .dialog-name { font-weight: 500; color: white; margin-bottom: 4px; }
        .dialog-last { font-size: 13px; color: #8e9eae; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dialog-meta { text-align: right; }
        .dialog-time { font-size: 11px; color: #8e9eae; }
        .unread {
            background: #50a6e5;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 11px;
            margin-top: 4px;
        }
        
        /* Chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #17212b;
        }
        
        .chat-header {
            background: #1f2a36;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2c3a47;
        }
        
        .back-btn, .menu-toggle {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
        }
        
        .back-btn { display: none; }
        @media (max-width: 768px) { .back-btn { display: block; } }
        
        .chat-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; color: white; }
        .chat-status { font-size: 12px; color: #8e9eae; }
        .chat-actions { display: flex; gap: 8px; }
        
        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            display: flex;
            animation: fadeIn 0.2s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
        }
        
        .message.sent .message-bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.received .message-bubble {
            background: #1f2a36;
            color: white;
            border-bottom-left-radius: 4px;
        }
        
        .reply-preview {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .message-text { font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; text-align: right; }
        
        /* Input panel */
        .input-panel {
            background: #1f2a36;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        
        .input-btn {
            background: none;
            border: none;
            color: #8e9eae;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
        }
        
        .input-btn:active { color: #50a6e5; transform: scale(0.95); }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #17212b;
            border: none;
            border-radius: 22px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 100px;
        }
        
        .send-btn {
            background: #50a6e5;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        .send-btn:active { transform: scale(0.95); }
        
        /* Reply bar */
        .reply-bar {
            background: #1f2a36;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #2c3a47;
        }
        
        .reply-text { flex: 1; font-size: 13px; color: #8e9eae; }
        .cancel-reply { background: none; border: none; color: #e53935; font-size: 20px; cursor: pointer; }
        
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1f2a36;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 340px;
        }
        
        .modal-content h3 { color: white; margin-bottom: 16px; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #17212b;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-primary { background: #50a6e5; color: white; }
        .btn-danger { background: #e53935; color: white; }
        .btn-secondary { background: #2b3a4a; color: #8e9eae; }
        
        /* Context menu */
        .context-menu {
            position: fixed;
            background: #1f2a36;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }
        
        .context-item {
            padding: 10px 20px;
            cursor: pointer;
            color: white;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .context-item:hover { background: #2b3a4a; }
        .context-item.danger { color: #e53935; }
        
        /* Emoji picker */
        .emoji-picker {
            position: fixed;
            bottom: 80px;
            left: 16px;
            background: #1f2a36;
            padding: 12px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            z-index: 1000;
            border: 1px solid #2c3a47;
        }
        
        .emoji-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
        }
        
        .emoji-btn:active { background: #2b3a4a; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a36;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            animation: slideUp 0.3s;
            white-space: nowrap;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .empty-state {
            text-align: center;
            color: #8e9eae;
            margin-top: 50px;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile-row">
                <div class="profile-left">
                    <div class="avatar" id="myAvatar" onclick="openProfileModal()">👤</div>
                    <div>
                        <div class="name" id="myName">Загрузка...</div>
                        <div class="status-text" id="myStatus">онлайн</div>
                    </div>
                </div>
                <div>
                    <button class="icon-btn" onclick="openCreateMenu()">✏️</button>
                    <button class="icon-btn" onclick="openSettings()">⚙️</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск" onkeyup="searchDialogs()">
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('dialogs')">💬 Чаты</button>
                <button class="tab" onclick="switchTab('contacts')">👥 Контакты</button>
            </div>
        </div>
        <div class="dialogs-list" id="dialogsList"></div>
        <div class="contacts-list" id="contactsList" style="display: none;"></div>
    </div>
    
    <!-- Chat area -->
    <div class="chat-area">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">💬</div>
            <div class="chat-info">
                <div class="chat-name" id="chatName">Messenger</div>
                <div class="chat-status" id="chatStatus">онлайн</div>
            </div>
            <div class="chat-actions">
                <button class="icon-btn" onclick="startCall()" id="callBtn" style="display: none;">📞</button>
                <button class="icon-btn" onclick="showChatMenu()" id="menuBtn" style="display: none;">⋮</button>
            </div>
        </div>
        
        <div class="messages" id="messagesArea">
            <div class="empty-state">✨ Выберите диалог для общения</div>
        </div>
        
        <div id="replyBar" class="reply-bar" style="display: none;">
            <div class="reply-text" id="replyText"></div>
            <button class="cancel-reply" onclick="cancelReply()">✕</button>
        </div>
        
        <div class="input-panel">
            <button class="input-btn" onclick="attachFile()">📎</button>
            <button class="input-btn" onclick="showEmojiPicker()">😊</button>
            <textarea class="message-input" id="messageInput" placeholder="Сообщение" rows="1" onkeypress="handleEnter(event)" onkeyup="autoResize(this)"></textarea>
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<!-- Modals -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>📝 Редактировать профиль</h3>
        <input type="text" id="editName" placeholder="Имя">
        <input type="text" id="editAvatar" placeholder="Аватар (эмодзи)" maxlength="2">
        <textarea id="editBio" placeholder="О себе" rows="2"></textarea>
        <input type="text" id="editPhone" placeholder="Телефон">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="updateProfile()">Сохранить</button>
            <button class="btn-danger" onclick="deleteAccount()">Удалить аккаунт</button>
            <button class="btn-secondary" onclick="closeModal('profileModal')">Отмена</button>
        </div>
    </div>
</div>

<div class="modal" id="createModal">
    <div class="modal-content">
        <h3>➕ Создать</h3>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="showGroupModal()">👥 Группу</button>
            <button class="btn-primary" onclick="showChannelModal()">📢 Канал</button>
            <button class="btn-primary" onclick="showPollModal()">📊 Опрос</button>
            <button class="btn-secondary" onclick="closeModal('createModal')">Отмена</button>
        </div>
    </div>
</div>

<div class="modal" id="groupModal">
    <div class="modal-content">
        <h3>👥 Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название">
        <input type="text" id="groupAvatar" placeholder="Аватар" maxlength="2">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="createGroup()">Создать</button>
            <button class="btn-secondary" onclick="closeModal('groupModal')">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let ws = null;
    let currentUser = {
        id: '', name: '', avatar: '😎', bio: '', phone: ''
    };
    let users = new Map();
    let dialogs = new Map();
    let messages = new Map();
    let currentChat = null;
    let typingTimeout = null;
    let replyToMessage = null;
    let selectedMessageId = null;
    let currentTab = 'dialogs';
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        let savedId = localStorage.getItem('userId');
        if (!savedId) {
            savedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', savedId);
        }
        currentUser.id = savedId;
        
        let savedData = localStorage.getItem('userData');
        if (savedData) {
            const data = JSON.parse(savedData);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
            currentUser.bio = data.bio || '';
            currentUser.phone = data.phone || '';
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            currentUser.avatar = ['😊', '😎', '🤓', '🥳'][Math.floor(Math.random() * 4)];
            localStorage.setItem('userData', JSON.stringify({ name: currentUser.name, avatar: currentUser.avatar }));
        }
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        connect();
    }
    
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar,
                bio: currentUser.bio,
                phone: currentUser.phone
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleMessage(data);
        };
        
        ws.onclose = () => {
            setTimeout(connect, 3000);
            showToast('🔄 Переподключение...');
        };
    }
    
    function handleMessage(data) {
        switch(data.type) {
            case 'registered':
                showToast(`✨ Добро пожаловать, ${currentUser.name}!`);
                ws.send(JSON.stringify({ type: 'get_users' }));
                break;
                
            case 'user_list':
                users.clear();
                data.users.forEach(user => {
                    if (user.id !== currentUser.id) {
                        users.set(user.id, {
                            name: user.name,
                            avatar: user.avatar,
                            online: user.online,
                            isAdmin: user.isAdmin,
                            bio: user.bio
                        });
                        if (!messages.has(user.id)) messages.set(user.id, []);
                        updateDialog(user.id);
                    }
                });
                renderDialogs();
                break;
                
            case 'new_message':
                const fromId = data.message.from;
                if (!messages.has(fromId)) messages.set(fromId, []);
                messages.get(fromId).push(data.message);
                updateDialog(fromId, data.message.text, data.message.time);
                
                if (currentChat === fromId) {
                    renderMessages();
                    markAsRead(fromId);
                } else {
                    const dialog = dialogs.get(fromId);
                    if (dialog) dialog.unread = (dialog.unread || 0) + 1;
                    renderDialogs();
                    showToast(`📩 ${data.fromName}: ${data.message.text.substring(0, 30)}`);
                }
                break;
                
            case 'message_sent':
                if (currentChat === data.message.to) {
                    const msgs = messages.get(currentChat);
                    if (msgs) {
                        const idx = msgs.findIndex(m => m.id === data.message.id);
                        if (idx !== -1) msgs[idx] = data.message;
                        renderMessages();
                    }
                }
                break;
                
            case 'message_edited':
                if (currentChat) {
                    const msgs = messages.get(currentChat);
                    const idx = msgs?.findIndex(m => m.id === data.messageId);
                    if (idx !== -1) {
                        msgs[idx].text = data.newText;
                        msgs[idx].edited = true;
                        renderMessages();
                    }
                }
                break;
                
            case 'message_deleted':
                if (currentChat) {
                    const msgs = messages.get(currentChat);
                    const idx = msgs?.findIndex(m => m.id === data.messageId);
                    if (idx !== -1) {
                        msgs[idx].text = '🗑️ Сообщение удалено';
                        msgs[idx].deleted = true;
                        renderMessages();
                    }
                }
                break;
                
            case 'typing':
                if (currentChat === data.from) {
                    const status = document.getElementById('chatStatus');
                    if (data.isTyping) status.innerHTML = '✍️ печатает...';
                    else {
                        const user = users.get(data.from);
                        status.innerHTML = user?.online ? '🟢 онлайн' : '⚫ не в сети';
                    }
                }
                break;
                
            case 'profile_updated':
                currentUser.name = data.name;
                currentUser.avatar = data.avatar;
                currentUser.bio = data.bio || '';
                document.getElementById('myName').textContent = currentUser.name;
                document.getElementById('myAvatar').textContent = currentUser.avatar;
                localStorage.setItem('userData', JSON.stringify({
                    name: currentUser.name, avatar: currentUser.avatar,
                    bio: currentUser.bio, phone: currentUser.phone
                }));
                showToast('✅ Профиль обновлён');
                break;
                
            case 'system_message':
                showToast(data.text);
                break;
                
            case 'error':
                showToast('❌ ' + data.text);
                break;
        }
    }
    
    // ========== ДИАЛОГИ ==========
    function updateDialog(userId, lastMsg = null, time = null) {
        const user = users.get(userId);
        if (!user) return;
        
        const msgs = messages.get(userId) || [];
        const lastMessage = lastMsg || (msgs.length > 0 ? msgs[msgs.length - 1].text : '');
        const lastTime = time || (msgs.length > 0 ? msgs[msgs.length - 1].time : '');
        const unread = msgs.filter(m => m.from !== currentUser.id && !m.read).length;
        
        dialogs.set(userId, {
            name: user.name,
            avatar: user.avatar,
            online: user.online,
            lastMessage: lastMessage,
            time: lastTime,
            unread: unread
        });
    }
    
    function renderDialogs() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('dialogsList');
        
        const sorted = Array.from(dialogs.entries()).sort((a, b) => 
            (b[1].time || '').localeCompare(a[1].time || '')
        );
        
        const filtered = sorted.filter(([id, d]) => d.name.toLowerCase().includes(search));
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Нет диалогов</div>';
            return;
        }
        
        container.innerHTML = filtered.map(([id, d]) => `
            <div class="dialog" onclick="openChat('${id}')">
                <div class="dialog-avatar">
                    ${d.avatar}
                    ${d.online ? '<div class="online-badge"></div>' : ''}
                </div>
                <div class="dialog-info">
                    <div class="dialog-name">${escapeHtml(d.name)}</div>
                    <div class="dialog-last">${escapeHtml(d.lastMessage?.substring(0, 50) || 'Нажмите для чата')}</div>
                </div>
                <div class="dialog-meta">
                    <div class="dialog-time">${d.time || ''}</div>
                    ${d.unread > 0 ? `<div class="unread">${d.unread}</div>` : ''}
                </div>
            </div>
        `).join('');
    }
    
    function renderContacts() {
        const container = document.getElementById('contactsList');
        const contacts = Array.from(users.entries());
        
        if (contacts.length === 0) {
            container.innerHTML = '<div class="empty-state">👥 Нет контактов</div>';
            return;
        }
        
        container.innerHTML = contacts.map(([id, user]) => `
            <div class="contact-item" onclick="openChat('${id}')">
                <div class="dialog-avatar">
                    ${user.avatar}
                    ${user.online ? '<div class="online-badge"></div>' : ''}
                </div>
                <div class="dialog-info">
                    <div class="dialog-name">${escapeHtml(user.name)}</div>
                    <div class="dialog-last">${user.bio || 'Нет описания'}</div>
                </div>
                <button class="icon-btn" onclick="event.stopPropagation(); addContact('${id}')">➕</button>
            </div>
        `).join('');
    }
    
    function openChat(userId) {
        currentChat = userId;
        const user = users.get(userId);
        
        document.getElementById('chatAvatar').textContent = user.avatar;
        document.getElementById('chatName').textContent = user.name;
        document.getElementById('chatStatus').innerHTML = user.online ? '🟢 онлайн' : '⚫ не в сети';
        document.getElementById('callBtn').style.display = 'flex';
        document.getElementById('menuBtn').style.display = 'flex';
        
        if (dialogs.has(userId)) dialogs.get(userId).unread = 0;
        
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        markAsRead(userId);
        renderDialogs();
        renderMessages();
        setTimeout(() => document.getElementById('messageInput').focus(), 200);
    }
    
    function closeChat() {
        currentChat = null;
        document.getElementById('chatName').textContent = 'Messenger';
        document.getElementById('chatAvatar').textContent = '💬';
        document.getElementById('chatStatus').innerHTML = 'онлайн';
        document.getElementById('callBtn').style.display = 'none';
        document.getElementById('menuBtn').style.display = 'none';
        document.getElementById('messagesArea').innerHTML = '<div class="empty-state">✨ Выберите диалог для общения</div>';
        cancelReply();
    }
    
    // ========== СООБЩЕНИЯ ==========
    function renderMessages() {
        if (!currentChat) return;
        
        const msgs = messages.get(currentChat) || [];
        const container = document.getElementById('messagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.from === currentUser.id ? 'sent' : 'received'}" 
                 ${msg.from === currentUser.id ? `oncontextmenu="showMessageMenu(event, ${msg.id})"` : ''}>
                <div class="message-bubble">
                    ${msg.replyTo ? `<div class="reply-preview">↩️ Ответ: ${escapeHtml(msg.replyText?.substring(0, 50))}</div>` : ''}
                    ${msg.forwarded ? `<div class="reply-preview">📎 Переслано от ${escapeHtml(msg.originalFromName)}</div>` : ''}
                    ${msg.sticker ? `<div style="font-size: 48px; text-align: center;">${msg.sticker}</div>` : ''}
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">
                        ${msg.time || 'только что'}
                        ${msg.edited ? '<span style="margin-left: 4px;">(ред.)</span>' : ''}
                        ${msg.from === currentUser.id ? (msg.read ? '✓✓' : '✓') : ''}
                    </div>
                </div>
            </div>
        `).join('');
        
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text || !currentChat || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if (!messages.has(currentChat)) messages.set(currentChat, []);
        const tempMsg = {
            id: Date.now(),
            from: currentUser.id,
            text: text,
            time: time,
            read: false,
            replyTo: replyToMessage?.id,
            replyText: replyToMessage?.text
        };
        messages.get(currentChat).push(tempMsg);
        
        ws.send(JSON.stringify({
            type: replyToMessage ? 'reply_message' : 'private_message',
            from: currentUser.id,
            to: currentChat,
            text: text,
            time: time,
            replyToId: replyToMessage?.id
        }));
        
        updateDialog(currentChat, text, time);
        renderMessages();
        renderDialogs();
        input.value = '';
        autoResize(input);
        cancelReply();
        
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChat,
            from: currentUser.id,
            fromName: currentUser.name,
            isTyping: false
        }));
    }
    
    function editMessage() {
        if (selectedMessageId && currentChat) {
            const newText = prompt('Введите новый текст:');
            if (newText?.trim()) {
                ws.send(JSON.stringify({
                    type: 'edit_message',
                    userId: currentUser.id,
                    otherId: currentChat,
                    messageId: selectedMessageId,
                    newText: newText
                }));
                
                const msgs = messages.get(currentChat);
                const idx = msgs.findIndex(m => m.id === selectedMessageId);
                if (idx !== -1) {
                    msgs[idx].text = newText;
                    msgs[idx].edited = true;
                    renderMessages();
                }
                showToast('✏️ Сообщение отредактировано');
            }
        }
    }
    
    function deleteMessage() {
        if (selectedMessageId && currentChat && confirm('Удалить сообщение?')) {
            ws.send(JSON.stringify({
                type: 'delete_message',
                userId: currentUser.id,
                otherId: currentChat,
                messageId: selectedMessageId
            }));
            
            const msgs = messages.get(currentChat);
            const idx = msgs.findIndex(m => m.id === selectedMessageId);
            if (idx !== -1) {
                msgs[idx].text = '🗑️ Сообщение удалено';
                msgs[idx].deleted = true;
                renderMessages();
            }
            showToast('🗑️ Сообщение удалено');
        }
    }
    
    function forwardMessage() {
        if (selectedMessageId && currentChat) {
            const msgs = messages.get(currentChat);
            const msgToForward = msgs.find(m => m.id === selectedMessageId);
            if (msgToForward) {
                const userId = prompt('Введите ID пользователя для пересылки:');
                if (userId && users.has(userId)) {
                    ws.send(JSON.stringify({
                        type: 'forward_message',
                        userId: currentUser.id,
                        toUserId: userId,
                        messageId: selectedMessageId,
                        originalFrom: currentChat
                    }));
                    showToast('📎 Сообщение переслано');
                }
            }
        }
    }
    
    function replyToMessage(msg) {
        replyToMessage = msg;
        document.getElementById('replyBar').style.display = 'flex';
        document.getElementById('replyText').innerHTML = `↩️ Ответ: ${escapeHtml(msg.text.substring(0, 50))}`;
    }
    
    function cancelReply() {
        replyToMessage = null;
        document.getElementById('replyBar').style.display = 'none';
    }
    
    function addReaction(messageId, reaction) {
        ws.send(JSON.stringify({
            type: 'add_reaction',
            chatId: currentChat,
            messageId: messageId,
            userId: currentUser.id,
            reaction: reaction
        }));
    }
    
    function markAsRead(userId) {
        ws.send(JSON.stringify({
            type: 'mark_read',
            userId: currentUser.id,
            otherId: userId
        }));
    }
    
    // ========== ПРОФИЛЬ ==========
    function updateProfile() {
        const name = document.getElementById('editName').value.trim();
        const avatar = document.getElementById('editAvatar').value.trim();
        const bio = document.getElementById('editBio').value.trim();
        const phone = document.getElementById('editPhone').value.trim();
        
        if (name) currentUser.name = name;
        if (avatar) currentUser.avatar = avatar;
        if (bio) currentUser.bio = bio;
        if (phone) currentUser.phone = phone;
        
        localStorage.setItem('userData', JSON.stringify({
            name: currentUser.name, avatar: currentUser.avatar,
            bio: currentUser.bio, phone: currentUser.phone
        }));
        
        ws.send(JSON.stringify({
            type: 'update_profile',
            userId: currentUser.id,
            name: currentUser.name,
            avatar: currentUser.avatar,
            bio: currentUser.bio,
            phone: currentUser.phone
        }));
        
        closeModal('profileModal');
    }
    
    function deleteAccount() {
        if (confirm('❗ ВЫ УВЕРЕНЫ? Аккаунт будет удалён навсегда!')) {
            ws.send(JSON.stringify({ type: 'delete_account', userId: currentUser.id }));
            localStorage.clear();
            setTimeout(() => location.reload(), 1000);
        }
    }
    
    // ========== ГРУППЫ И КАНАЛЫ ==========
    function createGroup() {
        const name = document.getElementById('groupName').value.trim();
        if (name) {
            ws.send(JSON.stringify({
                type: 'create_group',
                creatorId: currentUser.id,
                name: name,
                avatar: document.getElementById('groupAvatar').value.trim() || '👥',
                members: []
            }));
            closeModal('groupModal');
            showToast('👥 Группа создана!');
        }
    }
    
    function startCall() {
        if (currentChat) {
            showToast('📞 Звонок... (функция в разработке)');
        }
    }
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }
    
    function searchDialogs() {
        if (currentTab === 'dialogs') renderDialogs();
        else renderContacts();
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('dialogsList').style.display = tab === 'dialogs' ? 'block' : 'none';
        document.getElementById('contactsList').style.display = tab === 'contacts' ? 'block' : 'none';
        
        if (tab === 'dialogs') renderDialogs();
        else renderContacts();
    }
    
    function openProfileModal() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editAvatar').value = currentUser.avatar;
        document.getElementById('editBio').value = currentUser.bio || '';
        document.getElementById('editPhone').value = currentUser.phone || '';
        document.getElementById('profileModal').style.display = 'flex';
    }
    
    function openCreateMenu() {
        document.getElementById('createModal').style.display = 'flex';
    }
    
    function showGroupModal() {
        closeModal('createModal');
        document.getElementById('groupModal').style.display = 'flex';
    }
    
    function showChannelModal() {
        closeModal('createModal');
        showToast('📢 Каналы в разработке');
    }
    
    function showPollModal() {
        closeModal('createModal');
        showToast('📊 Опросы в разработке');
    }
    
    function openSettings() {
        openProfileModal();
    }
    
    function showChatMenu() {
        if (currentChat) {
            const user = users.get(currentChat);
            if (user) {
                showToast(`👤 ${user.name}\n📱 ${user.bio || 'Нет описания'}`);
            }
        }
    }
    
    function addContact(userId) {
        ws.send(JSON.stringify({
            type: 'add_contact',
            userId: currentUser.id,
            contactId: userId
        }));
        showToast('👤 Контакт добавлен');
    }
    
    function showEmojiPicker() {
        const emojis = ['😊', '😂', '❤️', '👍', '🎉', '🔥', '✨', '💯', '😎', '🥳', '🤣', '😍', '😭', '😱', '🙏', '💪'];
        const picker = document.createElement('div');
        picker.className = 'emoji-picker';
        
        emojis.forEach(emoji => {
            const btn = document.createElement('button');
            btn.textContent = emoji;
            btn.className = 'emoji-btn';
            btn.onclick = () => {
                const input = document.getElementById('messageInput');
                input.value += emoji;
                input.focus();
                picker.remove();
            };
            picker.appendChild(btn);
        });
        
        document.body.appendChild(picker);
        setTimeout(() => picker.remove(), 5000);
    }
    
    function attachFile() {
        showToast('📎 Отправка файлов в разработке');
    }
    
    function showMessageMenu(event, messageId) {
        event.preventDefault();
        selectedMessageId = messageId;
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = event.pageX + 'px';
        menu.style.top = event.pageY + 'px';
        menu.innerHTML = `
            <div class="context-item" onclick="editMessage(); this.parentElement.remove()">✏️ Редактировать</div>
            <div class="context-item" onclick="forwardMessage(); this.parentElement.remove()">📎 Переслать</div>
            <div class="context-item" onclick="replyToMessage(messages.get(currentChat).find(m => m.id === ${messageId})); this.parentElement.remove()">↩️ Ответить</div>
            <div class="context-item danger" onclick="deleteMessage(); this.parentElement.remove()">🗑️ Удалить</div>
        `;
        document.body.appendChild(menu);
        setTimeout(() => menu.remove(), 5000);
    }
    
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        
        if (ws && currentChat) {
            if (typingTimeout) clearTimeout(typingTimeout);
            ws.send(JSON.stringify({
                type: 'typing',
                to: currentChat,
                from: currentUser.id,
                fromName: currentUser.name,
                isTyping: true
            }));
            typingTimeout = setTimeout(() => {
                ws.send(JSON.stringify({
                    type: 'typing',
                    to: currentChat,
                    from: currentUser.id,
                    fromName: currentUser.name,
                    isTyping: false
                }));
            }, 1000);
        }
    }
    
    function handleEnter(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Пинг для поддержания соединения
    setInterval(() => {
        if (ws?.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
        }
    }, 30000);
    
    init();
</script>
</body>
</html>
