<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .sidebar {
            width: 350px;
            background: #f0f2f5;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            background: #0088cc;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.3s;
        }
        .chat-item:hover { background: #e9ecef; }
        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 4px; }
        .last-message { font-size: 12px; color: #666; }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            display: flex;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 18px;
        }
        .message.sent .message-bubble {
            background: #0088cc;
            color: white;
        }
        .message.received .message-bubble {
            background: white;
            color: #333;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        .send-btn {
            background: #0088cc;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
        }
        input, button { margin-top: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="app" id="app" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <span id="userName">Загрузка...</span>
            </div>
            <button onclick="openSettings()" style="background: none; border: none; color: white; font-size: 20px;">⚙️</button>
        </div>
        <div class="chats-list" id="chatsList"></div>
    </div>
    <div class="chat-main">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <div class="avatar" id="chatAvatar">💬</div>
            <div>
                <div style="font-weight: 600;" id="chatName"></div>
                <div style="font-size: 12px;" id="chatStatus"></div>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align: center; color: #999;">👈 Выберите собеседника</div>
        </div>
        <div class="input-area" id="inputArea" style="display: none;">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>Ваш профиль</h3>
        <input type="text" id="profileName" placeholder="Имя">
        <input type="text" id="profileAvatar" placeholder="Эмодзи (😊)" maxlength="2">
        <button onclick="saveSettings()">Сохранить</button>
        <button onclick="closeSettings()">Отмена</button>
    </div>
</div>
<script>
    let ws = null;
    let currentUser = { id: 'user_' + Date.now(), name: 'Я', avatar: '👤' };
    let chats = new Map();
    let currentChat = null;
    
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            document.getElementById('app').style.display = 'flex';
            loadUser();
            ws.send(JSON.stringify({ type: 'register', userId: currentUser.id, name: currentUser.name, avatar: currentUser.avatar }));
        };
        
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'online_users') {
                data.users.forEach(u => { if(chats.has(u.id)) chats.get(u.id).online = true; });
                renderChats();
            }
            if (data.type === 'new_message') {
                if(!chats.has(data.message.from)) chats.set(data.message.from, { name: data.fromUser.name, avatar: data.fromUser.avatar, messages: [], online: true });
                const chat = chats.get(data.message.from);
                chat.messages.push(data.message);
                if(currentChat === data.message.from) { renderMessages(); }
                else { chat.unread = (chat.unread || 0) + 1; }
                renderChats();
            }
            if (data.type === 'message_sent') {
                if(currentChat) { const chat = chats.get(currentChat); if(chat) { const idx = chat.messages.findIndex(m => m.id === data.message.id); if(idx !== -1) chat.messages[idx] = data.message; renderMessages(); } }
            }
        };
    }
    
    function loadUser() {
        const saved = localStorage.getItem('user');
        if(saved) { const u = JSON.parse(saved); currentUser.name = u.name; currentUser.avatar = u.avatar; }
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('userAvatar').innerText = currentUser.avatar;
    }
    
    function saveSettings() {
        const name = document.getElementById('profileName').value.trim();
        const avatar = document.getElementById('profileAvatar').value.trim();
        if(name) currentUser.name = name;
        if(avatar) currentUser.avatar = avatar;
        localStorage.setItem('user', JSON.stringify({ name: currentUser.name, avatar: currentUser.avatar }));
        closeSettings();
        location.reload();
    }
    
    function selectChat(chatId) {
        currentChat = chatId;
        const chat = chats.get(chatId);
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        document.getElementById('chatName').innerText = chat.name;
        document.getElementById('chatAvatar').innerText = chat.avatar;
        document.getElementById('chatStatus').innerText = chat.online ? '🟢 онлайн' : '⚫ не в сети';
        chat.unread = 0;
        renderMessages();
        renderChats();
    }
    
    function renderChats() {
        const container = document.getElementById('chatsList');
        container.innerHTML = Array.from(chats.entries()).map(([id, chat]) => `
            <div class="chat-item" onclick="selectChat('${id}')">
                <div class="chat-avatar">${chat.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${chat.name}</div>
                    <div class="last-message">${chat.messages[chat.messages.length-1]?.text || 'Нет сообщений'}</div>
                </div>
                ${chat.unread ? `<div style="background: red; color: white; border-radius: 50%; padding: 2px 8px;">${chat.unread}</div>` : ''}
            </div>
        `).join('');
    }
    
    function renderMessages() {
        const chat = chats.get(currentChat);
        if(!chat) return;
        const container = document.getElementById('messagesArea');
        container.innerHTML = chat.messages.map(msg => `
            <div class="message ${msg.from === currentUser.id ? 'sent' : 'received'}">
                <div class="message-bubble">
                    ${msg.text}
                    <div style="font-size: 10px; margin-top: 5px;">${msg.time}</div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text || !currentChat) return;
        const msg = { type: 'private_message', from: currentUser.id, to: currentChat, text: text, time: new Date().toLocaleTimeString() };
        ws.send(JSON.stringify(msg));
        const chat = chats.get(currentChat);
        chat.messages.push({ id: Date.now(), from: currentUser.id, text: text, time: msg.time });
        renderMessages();
        input.value = '';
    }
    
    function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; document.getElementById('profileName').value = currentUser.name; document.getElementById('profileAvatar').value = currentUser.avatar; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    
    connect();
    setInterval(() => { if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' })); }, 30000);
</script>
</body>
</html>
