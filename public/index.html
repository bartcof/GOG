<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MEGA Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #17212b;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #2c3a47;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-btn {
                display: block;
            }
        }
        
        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 24px;
            cursor: pointer;
            margin-right: 12px;
        }
        
        /* Header */
        .header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c3a47;
        }
        
        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .user-name {
            color: white;
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }
        
        .icon-btn {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }
        
        .search {
            width: 100%;
            padding: 10px 16px;
            background: #1f2a36;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        
        .search::placeholder {
            color: #8e9eae;
        }
        
        /* Users list */
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1f2a36;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        
        .user-item:active {
            background: #2b3a4a;
            transform: scale(0.98);
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 12px;
            position: relative;
        }
        
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4cd137;
            border-radius: 50%;
            border: 2px solid #1f2a36;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name-text {
            color: white;
            font-weight: 500;
        }
        
        .user-preview {
            font-size: 11px;
            color: #8e9eae;
            margin-top: 2px;
        }
        
        .unread-badge {
            background: #50a6e5;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        /* Chat panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #17212b;
        }
        
        .chat-header {
            padding: 16px 20px;
            background: #1f2a36;
            border-bottom: 1px solid #2c3a47;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #50a6e5;
            font-size: 24px;
            cursor: pointer;
            display: none;
        }
        
        @media (max-width: 768px) {
            .back-btn {
                display: block;
            }
        }
        
        .chat-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #50a6e5, #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            color: white;
            font-weight: 600;
        }
        
        .chat-status {
            font-size: 12px;
            color: #8e9eae;
        }
        
        .typing-status {
            font-size: 11px;
            color: #50a6e5;
            margin-top: 2px;
        }
        
        .chat-menu {
            display: flex;
            gap: 8px;
        }
        
        /* Messages */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            display: flex;
            animation: fadeIn 0.2s;
            position: relative;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
        }
        
        .message.sent .message-bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.received .message-bubble {
            background: #1f2a36;
            color: white;
            border-bottom-left-radius: 4px;
        }
        
        .message-text {
            font-size: 15px;
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        
        .message-status {
            font-size: 10px;
            margin-left: 4px;
        }
        
        /* Context menu */
        .context-menu {
            position: fixed;
            background: #1f2a36;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }
        
        .context-item {
            padding: 10px 20px;
            cursor: pointer;
            color: white;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .context-item:hover {
            background: #2b3a4a;
        }
        
        .context-item.danger {
            color: #e53935;
        }
        
        /* Input panel */
        .input-panel {
            padding: 12px 16px;
            background: #1f2a36;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .input-field {
            flex: 1;
            padding: 12px 16px;
            background: #17212b;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        
        .send-btn {
            width: 44px;
            height: 44px;
            background: #50a6e5;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1f2a36;
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 340px;
        }
        
        .modal-content h3 {
            color: white;
            margin-bottom: 16px;
        }
        
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #17212b;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-primary {
            background: #50a6e5;
            color: white;
        }
        
        .btn-danger {
            background: #e53935;
            color: white;
        }
        
        .btn-secondary {
            background: #2b3a4a;
            color: #8e9eae;
        }
        
        .empty-state {
            text-align: center;
            color: #8e9eae;
            margin-top: 50px;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a36;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            animation: fadeIn 0.3s;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="header">
            <div class="user-row">
                <div class="avatar" id="myAvatar" onclick="openProfileModal()">👤</div>
                <div class="user-name" id="myName">Загрузка...</div>
                <button class="icon-btn" onclick="openProfileModal()">⚙️</button>
            </div>
            <input type="text" class="search" id="searchInput" placeholder="Поиск" onkeyup="filterUsers()">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>
    
    <!-- Chat panel -->
    <div class="chat-panel">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
            <button class="back-btn" id="backBtn" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">💬</div>
            <div class="chat-info">
                <div class="chat-name" id="chatName">Мессенджер</div>
                <div class="chat-status" id="chatStatus">Выберите чат</div>
                <div class="typing-status" id="typingStatus"></div>
            </div>
            <div class="chat-menu">
                <button class="icon-btn" onclick="clearHistory()" id="clearHistoryBtn" style="display: none;">🗑️</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="empty-state">✨ Нажмите на пользователя чтобы начать общение</div>
        </div>
        <div class="input-panel">
            <textarea class="input-field" id="messageInput" placeholder="Сообщение" rows="1" onkeypress="handleEnter(event)" onkeyup="onTyping()"></textarea>
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<!-- Profile modal -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>📝 Профиль</h3>
        <input type="text" id="editName" placeholder="Имя">
        <input type="text" id="editAvatar" placeholder="Аватар" maxlength="2">
        <textarea id="editBio" placeholder="О себе" rows="2"></textarea>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-danger" onclick="deleteAccount()">Удалить аккаунт</button>
            <button class="btn-secondary" onclick="closeModal('profileModal')">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let ws = null;
    let currentUser = {
        id: '',
        name: '',
        avatar: '😊',
        bio: ''
    };
    let users = new Map();
    let messages = new Map();
    let currentChatId = null;
    let typingTimeout = null;
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        let savedId = localStorage.getItem('userId');
        if (!savedId) {
            savedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('userId', savedId);
        }
        currentUser.id = savedId;
        
        let savedData = localStorage.getItem('userData');
        if (savedData) {
            const data = JSON.parse(savedData);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
            currentUser.bio = data.bio || '';
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            currentUser.avatar = ['😊', '😎', '🤓', '🥳'][Math.floor(Math.random() * 4)];
            localStorage.setItem('userData', JSON.stringify({
                name: currentUser.name,
                avatar: currentUser.avatar,
                bio: ''
            }));
        }
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        
        connect();
    }
    
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar,
                bio: currentUser.bio
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleMessage(data);
        };
        
        ws.onclose = () => {
            setTimeout(connect, 3000);
            showToast('🔄 Переподключение...');
        };
    }
    
    function handleMessage(data) {
        switch(data.type) {
            case 'registered':
                showToast(`✨ Добро пожаловать, ${currentUser.name}!`);
                break;
                
            case 'users':
                users.clear();
                data.users.forEach(user => {
                    if (user.id !== currentUser.id) {
                        users.set(user.id, {
                            name: user.name,
                            avatar: user.avatar,
                            online: user.online,
                            bio: user.bio,
                            isAdmin: user.isAdmin
                        });
                    }
                });
                renderUsers();
                break;
                
            case 'chat_history':
                data.histories.forEach(history => {
                    const otherId = history.withUser;
                    if (otherId && otherId !== currentUser.id) {
                        messages.set(otherId, history.messages || []);
                    }
                });
                if (currentChatId) renderMessages();
                renderUsers();
                break;
                
            case 'message':
                if (!messages.has(data.from)) messages.set(data.from, []);
                messages.get(data.from).push({
                    id: Date.now(),
                    text: data.text,
                    time: data.time,
                    isMine: false
                });
                
                if (currentChatId === data.from) {
                    renderMessages();
                } else {
                    const user = users.get(data.from);
                    if (user) {
                        const unread = user.unread || 0;
                        user.unread = unread + 1;
                        renderUsers();
                        showToast(`📩 ${data.fromName}: ${data.text.substring(0, 30)}`);
                    }
                }
                renderUsers();
                break;
                
            case 'message_sent':
                if (currentChatId) {
                    const msgs = messages.get(currentChatId);
                    if (msgs && msgs.length > 0) {
                        const last = msgs[msgs.length - 1];
                        if (last.text === data.message.text) {
                            last.id = data.message.id;
                            last.time = data.message.time;
                            renderMessages();
                        }
                    }
                }
                break;
                
            case 'message_deleted':
                if (currentChatId) {
                    const msgs = messages.get(currentChatId);
                    const idx = msgs.findIndex(m => m.id === data.messageId);
                    if (idx !== -1) {
                        msgs[idx].text = '🗑️ Сообщение удалено';
                        msgs[idx].deleted = true;
                        renderMessages();
                    }
                }
                break;
                
            case 'history_cleared':
                if (currentChatId === data.withUser) {
                    messages.set(currentChatId, []);
                    renderMessages();
                    showToast('🗑️ История очищена');
                }
                break;
                
            case 'user_deleted':
                users.delete(data.userId);
                if (currentChatId === data.userId) {
                    closeChat();
                }
                renderUsers();
                showToast(`⚠️ ${data.name} удалил аккаунт`);
                break;
                
            case 'account_deleted':
                showToast(data.message);
                localStorage.clear();
                setTimeout(() => location.reload(), 2000);
                break;
                
            case 'typing':
                if (currentChatId === data.from) {
                    const typingDiv = document.getElementById('typingStatus');
                    if (data.isTyping) {
                        typingDiv.textContent = '✍️ печатает...';
                    } else {
                        typingDiv.textContent = '';
                    }
                }
                break;
                
            case 'profile_updated':
                if (currentUser.id === data.userId) {
                    currentUser.name = data.name;
                    currentUser.avatar = data.avatar;
                    currentUser.bio = data.bio;
                    document.getElementById('myName').textContent = currentUser.name;
                    document.getElementById('myAvatar').textContent = currentUser.avatar;
                    localStorage.setItem('userData', JSON.stringify({
                        name: currentUser.name,
                        avatar: currentUser.avatar,
                        bio: currentUser.bio
                    }));
                }
                break;
        }
    }
    
    // ========== UI ФУНКЦИИ ==========
    function renderUsers() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('usersList');
        
        const filtered = Array.from(users.entries()).filter(([id, user]) =>
            user.name.toLowerCase().includes(search)
        );
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #8e9eae; padding: 40px;">👥 Нет пользователей</div>';
            return;
        }
        
        container.innerHTML = filtered.map(([id, user]) => {
            const msgs = messages.get(id) || [];
            const lastMsg = msgs[msgs.length - 1];
            const unread = user.unread || 0;
            
            return `
                <div class="user-item" onclick="openChat('${id}')">
                    <div class="user-avatar">
                        ${user.avatar}
                        ${user.online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="user-info">
                        <div class="user-name-text">${escapeHtml(user.name)}</div>
                        <div class="user-preview">${user.online ? '🟢 онлайн' : '⚫ не в сети'}</div>
                        ${lastMsg ? `<div class="user-preview">${escapeHtml(lastMsg.text.substring(0, 30))}</div>` : ''}
                    </div>
                    ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                </div>
            `;
        }).join('');
    }
    
    function renderMessages() {
        if (!currentChatId) return;
        
        const msgs = messages.get(currentChatId) || [];
        const container = document.getElementById('messagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.isMine ? 'sent' : 'received'}" 
                 ${msg.isMine ? `oncontextmenu="showMessageMenu(event, ${msg.id})"` : ''}>
                <div class="message-bubble">
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">
                        ${msg.time || 'только что'}
                        ${msg.isMine ? (msg.read ? ' ✓✓' : ' ✓') : ''}
                    </div>
                </div>
            </div>
        `).join('');
        
        container.scrollTop = container.scrollHeight;
        
        // Отмечаем как прочитанные
        if (currentChatId) {
            const user = users.get(currentChatId);
            if (user && user.unread) {
                user.unread = 0;
                renderUsers();
            }
            markAsRead(currentChatId);
        }
    }
    
    function openChat(userId) {
        currentChatId = userId;
        const user = users.get(userId);
        
        document.getElementById('chatName').textContent = user.name;
        document.getElementById('chatAvatar').textContent = user.avatar;
        document.getElementById('chatStatus').innerHTML = user.online ? '🟢 онлайн' : '⚫ не в сети';
        document.getElementById('clearHistoryBtn').style.display = 'flex';
        
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        // Запрашиваем историю
        ws.send(JSON.stringify({
            type: 'get_history',
            userId: currentUser.id,
            withUserId: userId
        }));
        
        renderMessages();
        setTimeout(() => document.getElementById('messageInput').focus(), 100);
    }
    
    function closeChat() {
        currentChatId = null;
        document.getElementById('chatName').textContent = 'Мессенджер';
        document.getElementById('chatAvatar').textContent = '💬';
        document.getElementById('chatStatus').innerHTML = 'Выберите чат';
        document.getElementById('clearHistoryBtn').style.display = 'none';
        document.getElementById('messagesArea').innerHTML = '<div class="empty-state">✨ Нажмите на пользователя чтобы начать общение</div>';
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text || !currentChatId || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if (!messages.has(currentChatId)) messages.set(currentChatId, []);
        messages.get(currentChatId).push({
            text: text,
            time: time,
            isMine: true
        });
        
        ws.send(JSON.stringify({
            type: 'message',
            from: currentUser.id,
            to: currentChatId,
            text: text,
            time: time,
            fromName: currentUser.name
        }));
        
        renderMessages();
        renderUsers();
        input.value = '';
        
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChatId,
            from: currentUser.id,
            isTyping: false
        }));
    }
    
    function deleteMessage(messageId) {
        if (!currentChatId || !ws) return;
        
        ws.send(JSON.stringify({
            type: 'delete_message',
            userId: currentUser.id,
            otherId: currentChatId,
            messageId: messageId
        }));
        
        const msgs = messages.get(currentChatId);
        const idx = msgs.findIndex(m => m.id === messageId);
        if (idx !== -1) {
            msgs[idx].text = '🗑️ Сообщение удалено';
            msgs[idx].deleted = true;
            renderMessages();
        }
    }
    
    function clearHistory() {
        if (!currentChatId || !confirm('Очистить всю историю переписки?')) return;
        
        ws.send(JSON.stringify({
            type: 'clear_history',
            userId: currentUser.id,
            withUserId: currentChatId
        }));
        
        messages.set(currentChatId, []);
        renderMessages();
        showToast('🗑️ История очищена');
    }
    
    function deleteAccount() {
        if (!confirm('❗ ВЫ УВЕРЕНЫ? Аккаунт будет удалён навсегда вместе со всей историей!')) return;
        
        ws.send(JSON.stringify({
            type: 'delete_account',
            userId: currentUser.id
        }));
        
        localStorage.clear();
        showToast('⚠️ Аккаунт удалён');
        setTimeout(() => location.reload(), 2000);
    }
    
    function markAsRead(userId) {
        ws.send(JSON.stringify({
            type: 'mark_read',
            userId: currentUser.id,
            otherId: userId
        }));
    }
    
    function onTyping() {
        if (!currentChatId || !ws) return;
        
        if (typingTimeout) clearTimeout(typingTimeout);
        
        ws.send(JSON.stringify({
            type: 'typing',
            to: currentChatId,
            from: currentUser.id,
            fromName: currentUser.name,
            isTyping: true
        }));
        
        typingTimeout = setTimeout(() => {
            ws.send(JSON.stringify({
                type: 'typing',
                to: currentChatId,
                from: currentUser.id,
                isTyping: false
            }));
        }, 1000);
    }
    
    function saveProfile() {
        const name = document.getElementById('editName').value.trim();
        const avatar = document.getElementById('editAvatar').value.trim();
        const bio = document.getElementById('editBio').value.trim();
        
        if (name) currentUser.name = name;
        if (avatar) currentUser.avatar = avatar;
        if (bio) currentUser.bio = bio;
        
        localStorage.setItem('userData', JSON.stringify({
            name: currentUser.name,
            avatar: currentUser.avatar,
            bio: currentUser.bio
        }));
        
        ws.send(JSON.stringify({
            type: 'update_profile',
            userId: currentUser.id,
            name: currentUser.name,
            avatar: currentUser.avatar,
            bio: currentUser.bio
        }));
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        
        closeModal('profileModal');
        showToast('✅ Профиль обновлён');
    }
    
    function showMessageMenu(event, messageId) {
        event.preventDefault();
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = event.pageX + 'px';
        menu.style.top = event.pageY + 'px';
        menu.innerHTML = `
            <div class="context-item danger" onclick="deleteMessage(${messageId}); this.remove()">🗑️ Удалить</div>
        `;
        
        document.body.appendChild(menu);
        menu.style.display = 'block';
        
        setTimeout(() => menu.remove(), 3000);
    }
    
    function handleEnter(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }
    
    function filterUsers() {
        renderUsers();
    }
    
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }
    
    function openProfileModal() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editAvatar').value = currentUser.avatar;
        document.getElementById('editBio').value = currentUser.bio || '';
        document.getElementById('profileModal').style.display = 'flex';
    }
    
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Пинг каждые 30 секунд
    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
        }
    }, 30000);
    
    init();
</script>
</body>
</html>
