<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#17212b">
    <title>✨ MEGA MESSENGER PRO ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #17212b;
            --header: #17212b;
            --panel: #1f2a36;
            --bubble-sent: #2b5278;
            --bubble-received: #1f2a36;
            --text: #ffffff;
            --text-secondary: #8e9eae;
            --accent: #50a6e5;
            --divider: #2c3a47;
            --danger: #e53935;
            --success: #4cd137;
            --warning: #ff9800;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 100%;
            max-width: 360px;
            background: var(--bg);
            border-right: 1px solid var(--divider);
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar.open { transform: translateX(0); }
        @media (min-width: 768px) {
            .sidebar { transform: translateX(0); position: relative; width: 360px; }
            .menu-toggle { display: none; }
        }

        /* Header */
        .sidebar-header {
            background: var(--header);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--divider);
        }

        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        .name {
            font-weight: 600;
            color: var(--text);
            font-size: 17px;
        }

        .status-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }

        /* Search */
        .search-box {
            margin-top: 12px;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: var(--panel);
            border: none;
            border-radius: 30px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--divider);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        /* Lists */
        .dialogs-list, .contacts-list, .calls-list, .settings-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .dialog, .contact-item, .call-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--divider);
        }

        .dialog:active, .contact-item:active, .call-item:active {
            background: var(--panel);
        }

        .dialog-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-right: 12px;
            position: relative;
            flex-shrink: 0;
        }

        .online-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        .premium-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--warning);
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 10px;
        }

        .dialog-info {
            flex: 1;
            min-width: 0;
        }

        .dialog-name {
            font-weight: 500;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 4px;
        }

        .dialog-last {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dialog-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .dialog-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .unread {
            background: var(--accent);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 11px;
            margin-top: 4px;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-header {
            background: var(--header);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--divider);
        }

        .back-btn, .menu-toggle {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
        }

        .back-btn { display: none; }
        @media (max-width: 768px) { .back-btn { display: block; } }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2b5278);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text);
            font-size: 17px;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            animation: fadeIn 0.2s;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }

        .message-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 16px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: var(--bubble-sent);
            color: var(--text);
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: var(--bubble-received);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .reply-preview {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        .reactions {
            position: absolute;
            bottom: -8px;
            right: 0;
            display: flex;
            gap: 2px;
            background: var(--panel);
            border-radius: 20px;
            padding: 2px 6px;
            font-size: 12px;
        }

        /* Input panel */
        .input-panel {
            background: var(--panel);
            padding: 8px 12px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-btn:active {
            color: var(--accent);
            transform: scale(0.95);
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--bg);
            border: none;
            border-radius: 22px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 100px;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Reply bar */
        .reply-bar {
            background: var(--panel);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid var(--divider);
        }

        .reply-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .cancel-reply {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 20px;
            cursor: pointer;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 340px;
        }

        .modal-content h3 {
            color: var(--text);
            margin-bottom: 16px;
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg);
            border: none;
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: var(--bg); color: var(--text-secondary); }

        /* Reaction picker */
        .reaction-picker {
            position: fixed;
            bottom: 80px;
            background: var(--panel);
            padding: 8px;
            border-radius: 30px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            border: 1px solid var(--divider);
        }

        .reaction {
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .reaction:active { transform: scale(1.2); }

        /* Emoji picker */
        .emoji-picker {
            position: fixed;
            bottom: 80px;
            left: 16px;
            background: var(--panel);
            padding: 12px;
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            z-index: 1000;
            border: 1px solid var(--divider);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            animation: slideUp 0.3s;
            white-space: nowrap;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 50px;
            padding: 20px;
        }

        /* Voice recording */
        .voice-recording {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1000;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: var(--panel);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }

        .context-item {
            padding: 10px 20px;
            cursor: pointer;
            color: var(--text);
            border-radius: 8px;
            font-size: 14px;
        }

        .context-item:hover { background: var(--bg); }
        .context-item.danger { color: var(--danger); }
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="profile-row">
                <div class="profile-left">
                    <div class="avatar" id="myAvatar" onclick="openProfileModal()">👤</div>
                    <div>
                        <div class="name" id="myName">Загрузка...</div>
                        <div class="status-text" id="myStatus">онлайн</div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="openCreateMenu()">✏️</button>
                    <button class="icon-btn" onclick="openSettings()">⚙️</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск" onkeyup="searchDialogs()">
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('dialogs')">💬 Чаты</button>
                <button class="tab" onclick="switchTab('contacts')">👥 Контакты</button>
                <button class="tab" onclick="switchTab('calls')">📞 Звонки</button>
                <button class="tab" onclick="switchTab('settings')">⚙️</button>
            </div>
        </div>
        <div class="dialogs-list" id="dialogsList"></div>
        <div class="contacts-list" id="contactsList" style="display: none;"></div>
        <div class="calls-list" id="callsList" style="display: none;"></div>
        <div class="settings-list" id="settingsList" style="display: none;">
            <div style="padding: 20px;">
                <div class="dialog" onclick="openThemeSettings()">🎨 Тема (Тёмная/Светлая)</div>
                <div class="dialog" onclick="openNotificationSettings()">🔔 Уведомления</div>
                <div class="dialog" onclick="openPrivacySettings()">🔒 Конфиденциальность</div>
                <div class="dialog" onclick="openLanguageSettings()">🌐 Язык</div>
                <div class="dialog" onclick="openDataSettings()">💾 Данные и память</div>
                <div class="dialog" onclick="openProfileModal()">👤 Редактировать профиль</div>
                <div class="dialog" onclick="deleteAccount()" style="color: var(--danger);">🗑️ Удалить аккаунт</div>
            </div>
        </div>
    </div>
    
    <!-- Chat area -->
    <div class="chat-area">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <button class="back-btn" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">💬</div>
            <div class="chat-info">
                <div class="chat-name" id="chatName">Messenger</div>
                <div class="chat-status" id="chatStatus">онлайн</div>
            </div>
            <div class="chat-actions">
                <button class="icon-btn" onclick="startVoiceCall()" id="callBtn" style="display: none;">📞</button>
                <button class="icon-btn" onclick="startVideoCall()" id="videoBtn" style="display: none;">📹</button>
                <button class="icon-btn" onclick="showChatMenu()" id="menuBtn" style="display: none;">⋮</button>
            </div>
        </div>
        
        <div class="messages" id="messagesArea">
            <div class="empty-state">✨ Выберите диалог для общения</div>
        </div>
        
        <div id="replyBar" class="reply-bar" style="display: none;">
            <div class="reply-text" id="replyText"></div>
            <button class="cancel-reply" onclick="cancelReply()">✕</button>
        </div>
        
        <div class="input-panel">
            <button class="input-btn" onclick="attachFile()">📎</button>
            <button class="input-btn" onclick="showEmojiPicker()">😊</button>
            <button class="input-btn" onclick="startVoiceRecording()">🎤</button>
            <textarea class="message-input" id="messageInput" placeholder="Сообщение" rows="1" onkeypress="handleEnter(event)" onkeyup="autoResize(this)"></textarea>
            <button class="send-btn" onclick="sendMessage()">📤</button>
        </div>
    </div>
</div>

<!-- Modals -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h3>📝 Редактировать профиль</h3>
        <input type="text" id="editName" placeholder="Имя">
        <input type="text" id="editAvatar" placeholder="Аватар (эмодзи)" maxlength="2">
        <textarea id="editBio" placeholder="О себе (био)" rows="2"></textarea>
        <input type="text" id="editPhone" placeholder="Телефон">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="updateProfile()">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal('profileModal')">Отмена</button>
        </div>
    </div>
</div>

<div class="modal" id="groupModal">
    <div class="modal-content">
        <h3>👥 Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название">
        <input type="text" id="groupAvatar" placeholder="Аватар" maxlength="2">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="createGroup()">Создать</button>
            <button class="btn-secondary" onclick="closeModal('groupModal')">Отмена</button>
        </div>
    </div>
</div>

<div class="modal" id="channelModal">
    <div class="modal-content">
        <h3>📢 Создать канал</h3>
        <input type="text" id="channelName" placeholder="Название канала">
        <input type="text" id="channelAvatar" placeholder="Аватар" maxlength="2">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="createChannel()">Создать</button>
            <button class="btn-secondary" onclick="closeModal('channelModal')">Отмена</button>
        </div>
    </div>
</div>

<div class="modal" id="pollModal">
    <div class="modal-content">
        <h3>📊 Создать опрос</h3>
        <input type="text" id="pollQuestion" placeholder="Вопрос">
        <div id="pollOptions">
            <input type="text" placeholder="Вариант 1">
            <input type="text" placeholder="Вариант 2">
        </div>
        <button class="btn-secondary" onclick="addPollOption()">+ Добавить вариант</button>
        <select id="pollType">
            <option value="single">Одиночный выбор</option>
            <option value="multi">Множественный выбор</option>
        </select>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="createPoll()">Создать</button>
            <button class="btn-secondary" onclick="closeModal('pollModal')">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ПЕРЕМЕННЫЕ ==========
    let ws = null;
    let currentUser = {
        id: '', name: '', avatar: '😎', bio: '', phone: '', premium: false
    };
    let users = new Map();
    let dialogs = new Map();
    let messages = new Map();
    let currentChat = null;
    let typingTimeout = null;
    let replyToMessage = null;
    let selectedMessageId = null;
    let currentTab = 'dialogs';
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        let savedId = localStorage.getItem('tg_user_id');
        if (!savedId) {
            savedId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('tg_user_id', savedId);
        }
        currentUser.id = savedId;
        
        let savedData = localStorage.getItem('tg_user');
        if (savedData) {
            const data = JSON.parse(savedData);
            currentUser.name = data.name;
            currentUser.avatar = data.avatar;
            currentUser.bio = data.bio || '';
            currentUser.phone = data.phone || '';
        } else {
            currentUser.name = 'User_' + Math.floor(Math.random() * 1000);
            localStorage.setItem('tg_user', JSON.stringify({ name: currentUser.name, avatar: currentUser.avatar }));
        }
        
        document.getElementById('myName').textContent = currentUser.name;
        document.getElementById('myAvatar').textContent = currentUser.avatar;
        connect();
    }
    
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}`);
        
        ws.onopen = () => {
            ws.send(JSON.stringify({
                type: 'register',
                userId: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar,
                phone: currentUser.phone,
                bio: currentUser.bio
            }));
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleMessage(data);
        };
        
        ws.onclose = () => setTimeout(connect, 3000);
    }
    
    function handleMessage(data) {
        switch(data.type) {
            case 'registered':
                showToast(`✨ Добро пожаловать, ${currentUser.name}!`);
                ws.send(JSON.stringify({ type: 'get_users' }));
                break;
                
            case 'user_list':
                users.clear();
                data.users.forEach(user => {
                    if (user.id !== currentUser.id) {
                        users.set(user.id, {
                            name: user.name, avatar: user.avatar,
                            online: user.online, isAdmin: user.isAdmin,
                            lastSeen: user.lastSeen, phone: user.phone,
                            bio: user.bio, premium: user.premium
                        });
                        if (!messages.has(user.id)) messages.set(user.id, []);
                        updateDialog(user.id);
                    }
                });
                renderDialogs();
                break;
                
            case 'new_message':
                const fromId = data.message.from;
                if (!messages.has(fromId)) messages.set(fromId, []);
                messages.get(fromId).push(data.message);
                updateDialog(fromId, data.message.text, data.message.time);
                
                if (currentChat === fromId) {
                    renderMessages();
                    markAsRead(fromId);
                } else {
                    const dialog = dialogs.get(fromId);
                    if (dialog) dialog.unread = (dialog.unread || 0) + 1;
                    renderDialogs();
                    showToast(`📩 ${data.fromName}: ${data.message.text.substring(0, 30)}`);
                }
                break;
                
            case 'message_sent':
                if (currentChat === data.message.to) {
                    const msgs = messages.get(currentChat);
                    if (msgs) {
                        const idx = msgs.findIndex(m => m.id === data.message.id);
                        if (idx !== -1) msgs[idx] = data.message;
                        renderMessages();
                    }
                }
                break;
                
            case 'message_edited':
                if (currentChat) {
                    const msgs = messages.get(currentChat);
                    const idx = msgs?.findIndex(m => m.id === data.messageId);
                    if (idx !== -1) {
                        msgs[idx].text = data.newText;
                        msgs[idx].edited = true;
                        renderMessages();
                    }
                }
                break;
                
            case 'message_deleted':
                if (currentChat) {
                    const msgs = messages.get(currentChat);
                    const idx = msgs?.findIndex(m => m.id === data.messageId);
                    if (idx !== -1) {
                        msgs[idx].text = 'Сообщение удалено';
                        msgs[idx].deleted = true;
                        renderMessages();
                    }
                }
                break;
                
            case 'typing':
                if (currentChat === data.from) {
                    const status = document.getElementById('chatStatus');
                    if (data.isTyping) status.innerHTML = '✍️ печатает...';
                    else {
                        const user = users.get(data.from);
                        status.innerHTML = user?.online ? '🟢 онлайн' : '⚫ не в сети';
                    }
                }
                break;
                
            case 'profile_updated':
                if (data.user) {
                    currentUser.name = data.user.name;
                    currentUser.avatar = data.user.avatar;
                    document.getElementById('myName').textContent = currentUser.name;
                    document.getElementById('myAvatar').textContent = currentUser.avatar;
                    showToast('✅ Профиль обновлён');
                }
                break;
                
            case 'system':
                showToast(data.text);
                break;
                
            case 'error':
                showToast('❌ ' + data.text);
                break;
        }
    }
    
    // ========== ДИАЛОГИ ==========
    function updateDialog(userId, lastMsg = null, time = null) {
        const user = users.get(userId);
        if (!user) return;
        
        const msgs = messages.get(userId) || [];
        const lastMessage = lastMsg || (msgs.length > 0 ? msgs[msgs.length - 1].text : '');
        const lastTime = time || (msgs.length > 0 ? msgs[msgs.length - 1].time : '');
        const unread = msgs.filter(m => m.from !== currentUser.id && !m.read).length;
        
        dialogs.set(userId, {
            name: user.name, avatar: user.avatar, online: user.online,
            lastMessage: lastMessage, time: lastTime, unread: unread,
            premium: user.premium
        });
    }
    
    function renderDialogs() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('dialogsList');
        
        const sorted = Array.from(dialogs.entries()).sort((a, b) => 
            (b[1].time || '').localeCompare(a[1].time || '')
        );
        
        const filtered = sorted.filter(([id, d]) => d.name.toLowerCase().includes(search));
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Нет диалогов</div>';
            return;
        }
        
        container.innerHTML = filtered.map(([id, d]) => `
            <div class="dialog" onclick="openChat('${id}')">
                <div class="dialog-avatar">
                    ${d.avatar}
                    ${d.online ? '<div class="online-badge"></div>' : ''}
                    ${d.premium ? '<div class="premium-badge">⭐</div>' : ''}
                </div>
                <div class="dialog-info">
                    <div class="dialog-name">${escapeHtml(d.name)}</div>
                    <div class="dialog-last">${escapeHtml(d.lastMessage?.substring(0, 50) || 'Нет сообщений')}</div>
                </div>
                <div class="dialog-meta">
                    <div class="dialog-time">${d.time || ''}</div>
                    ${d.unread > 0 ? `<div class="unread">${d.unread}</div>` : ''}
                </div>
            </div>
        `).join('');
    }
    
    function renderContacts() {
        const container = document.getElementById('contactsList');
        const contacts = Array.from(users.entries());
        
        container.innerHTML = contacts.map(([id, user]) => `
            <div class="contact-item" onclick="openChat('${id}')">
                <div class="dialog-avatar">
                    ${user.avatar}
                    ${user.online ? '<div class="online-badge"></div>' : ''}
                </div>
                <div class="dialog-info">
                    <div class="dialog-name">${escapeHtml(user.name)}</div>

    // ========== СООБЩЕНИЯ ==========
    function renderMessages() {
        if (!currentChat) return;
        
        const msgs = messages.get(currentChat) || [];
        const container = document.getElementById('messagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.from === currentUser.id ? 'sent' : 'received'}" 
                 ${msg.from === currentUser.id ? `oncontextmenu="showMessageMenu(event, ${msg.id})"` : ''}>
                <div class="message-bubble">
                    ${msg.replyTo ? `<div class="reply-preview">↩️ Ответ на: ${escapeHtml(msg.replyText?.substring(0, 50))}</div>` : ''}
                    ${msg.sticker ? `<div style="font-size: 48px;">${msg.sticker}</div>` : ''}
                    ${msg.photo ? `<img src="${msg.photo}" style="max-width: 200px; border-radius: 12px;">` : ''}
                    ${msg.file ? `<div>📎 ${escapeHtml(msg.fileName)}</div>` : ''}
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">
                        ${msg.time || 'только что'}
                        ${msg.edited ? '<span style="margin-left: 4px;">(ред.)</span>' : ''}
                        ${msg.from === currentUser.id ? (msg.read ? '✓✓' : '✓') : ''}
                    </div>
                </div>
                ${msg.reactions ? `<div class="reactions">${msg.reactions}</div>` : ''}
            </div>
        `).join('');
        
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text || !currentChat || !ws) return;
        
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        if (!messages.has(currentChat)) messages.set(currentChat, []);
        const tempMsg = {
            id: Date.now(), from: currentUser.id, text: text,
            time: time, read: false, replyTo: replyToMessage?.id,
            replyText: replyToMessage?.text
        };
        messages.get(currentChat).push(tempMsg);
        
        ws.send(JSON.stringify({
            type: 'private_message',
            from: currentUser.id, to: currentChat,
            text: text, time: time, replyTo: replyToMessage?.id
        }));
        
        updateDialog(currentChat, text, time);
        renderMessages();
        renderDialogs();
        input.value = '';
        autoResize(input);
        cancelReply();
        
        if (typingTimeout) clearTimeout(typingTimeout);
        ws.send(JSON.stringify({
            type: 'typing', to: currentChat,
            from: currentUser.id, fromName: currentUser.name,
            isTyping: false
        }));
    }

            if (newText?.trim()) {

                    userId: currentUser.id, otherId: currentChat,
                    messageId: selectedMessageId, newText: newText

    // ========== ГОЛОСОВЫЕ СООБЩЕНИЯ ==========
    async function startVoiceRecording() {
        if (isRecording) {
            if (mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
            }
            return;
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                ws.send(JSON.stringify({
                    type: 'voice_message',
                    from: currentUser.id, to: currentChat,
                    duration: '0:30', url: audioUrl
                }));
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            showToast('🎤 Запись... Нажмите снова для остановки');
            
            setTimeout(() => {
                if (isRecording && mediaRecorder) {
                    mediaRecorder.stop();
                    isRecording = false;
                }
            }, 30000);
        } catch(e) {
            showToast('❌ Нет доступа к микрофону');
        }
    }

    function attachFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*,audio/*,.pdf,.doc,.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file && currentChat) {
                const reader = new FileReader();
                reader.onload = () => {
                    ws.send(JSON.stringify({
                        type: 'send_file',
                        from: currentUser.id, to: currentChat,
                        name: file.name, size: file.size,
                        url: reader.result, time: new Date().toLocaleTimeString()
                    }));
                };
                reader.readAsDataURL(file);
                showToast(`📎 Отправка: ${file.name}`);
            }
        };
        input.click();
    }

        setTimeout(() => toast.remove(), 2500);
    }
    
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Пинг
    setInterval(() => {
        if (ws?.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
        }
    }, 30000);
    
    init();
</script>
</body>
</html>
